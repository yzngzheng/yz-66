<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于我 - 赛博空间</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            font-family: 'Courier New', monospace;
            color: #00ffff;
        }
        
        /* 导航栏样式（与之前一致） */
        .navbar-cyber {
            background: linear-gradient(180deg, #0d0d15 0%, rgba(13, 13, 21, 0.95) 100%);
            border-bottom: 2px solid;
            border-image: linear-gradient(90deg, #ff00ff, #00ffff, #ff00ff) 1;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3), 0 0 40px rgba(0, 255, 255, 0.2);
            padding: 15px 0;
            position: relative;
            overflow: hidden;
        }
        
        .navbar-cyber::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ffff, transparent);
            animation: scan 3s infinite linear;
        }
        
        @keyframes scan {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        
        .navbar-brand {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            position: relative;
        }
        
        .navbar-brand::before, .navbar-brand::after {
            content: 'CYBER';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .navbar-brand::before {
            animation: glitch-1 0.3s infinite linear alternate-reverse;
            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
        }
        
        .navbar-brand::after {
            animation: glitch-2 0.3s infinite linear alternate-reverse;
            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
        }
        
        @keyframes glitch-1 {
            0% { transform: translate(0); }
            100% { transform: translate(-3px, -3px); }
        }
        
        @keyframes glitch-2 {
            0% { transform: translate(0); }
            100% { transform: translate(3px, 3px); }
        }
        
        .nav-link {
            color: #00ffff !important;
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 10px 25px !important;
            margin: 0 5px;
            border: 1px solid transparent;
            border-image: linear-gradient(90deg, #ff00ff, #00ffff) 1;
            transition: all 0.3s ease;
            background: rgba(0, 255, 255, 0.05);
        }
        
        .nav-link:hover {
            color: #ff00ff !important;
            background: rgba(255, 0, 255, 0.1);
            text-shadow: 0 0 10px #ff00ff;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.5);
            transform: translateY(-2px);
        }
        
        .nav-link.active {
            background: linear-gradient(90deg, rgba(255, 0, 255, 0.2), rgba(0, 255, 255, 0.2));
            color: #00ffff !important;
            text-shadow: 0 0 10px #00ffff;
            border: 1px solid #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
            animation: neon-pulse 2s infinite ease-in-out;
        }
        
        @keyframes neon-pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 255, 0.6); }
            50% { box-shadow: 0 0 30px rgba(0, 255, 255, 0.8); }
        }
        
        .navbar-toggler {
            border: 2px solid #00ffff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        
        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='%2300ffff' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }
        
        .navbar-collapse {
            background: rgba(10, 10, 15, 0.98);
            border: 1px solid;
            border-image: linear-gradient(90deg, #ff00ff, #00ffff) 1;
            margin-top: 10px;
            padding: 15px;
        }
        
        @media (max-width: 991px) {
            .nav-link {
                margin: 5px 0;
                text-align: center;
                border: 1px solid;
                border-image: linear-gradient(90deg, #ff00ff, #00ffff) 1;
            }
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: -1;
        }
        
        /* 关于我页面样式 */
        .about-section {
            padding-top: 120px;
            padding-bottom: 60px;
            min-height: 100vh;
        }
        
        .profile-card {
            background: rgba(10, 10, 15, 0.8);
            border: 2px solid;
            border-image: linear-gradient(180deg, #ff00ff, #00ffff) 1;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            padding: 40px;
            position: relative;
            overflow: hidden;
        }
        
        .profile-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff00ff, transparent);
            animation: scan-line 2s infinite linear;
        }
        
        @keyframes scan-line {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .avatar-container {
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
            position: relative;
        }
        
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid;
            border-image: linear-gradient(180deg, #ff00ff, #00ffff) 1;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.5);
            object-fit: cover;
        }
        
        .name {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .title {
            font-size: 1.2rem;
            color: #00ffff;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .info-item {
            background: rgba(0, 255, 255, 0.05);
            border-left: 3px solid #ff00ff;
            padding: 15px;
            transition: all 0.3s ease;
        }
        
        .info-item:hover {
            background: rgba(255, 0, 255, 0.1);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
            transform: translateX(5px);
        }
        
        .info-label {
            color: #ff00ff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }
        
        .info-value {
            color: #00ffff;
            font-size: 1.1rem;
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
        }
        
        .bio {
            margin-top: 40px;
            padding: 30px;
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }
        
        .bio-title {
            color: #ff00ff;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .bio-text {
            color: #00ffff;
            line-height: 1.8;
            font-size: 1rem;
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.3);
        }
        
        .section-title {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-cyber fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">CYBER</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" 
                    data-bs-target="#cyberNav" aria-controls="cyberNav" 
                    aria-expanded="false" aria-label="切换导航菜单">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="cyberNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="about.html">关于我</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="skills.html">技能</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="works.html">作品</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <!-- 关于我内容 -->
    <section class="about-section">
        <div class="container">
            <h2 class="section-title">// 个人资料</h2>
            
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="profile-card">
                        <!-- 头像 -->
                        <div class="avatar-container">
                            <img src="https://via.placeholder.com/200" alt="头像" class="avatar">
                        </div>
                        
                        <!-- 姓名 -->
                        <h1 class="name">CYBER_X</h1>
                        <p class="title">// 杨争 //</p>
                        
                        <!-- 个人信息网格 -->
                        <div class="info-grid">
                            <div class="info-item">
                                <div class="info-label">年龄</div>
                                <div class="info-value">19岁</div>
                            </div>
                            
                            <div class="info-item">
                                <div class="info-label">位置</div>
                                <div class="info-value">深圳, 中国</div>
                            </div>
                            
                            <div class="info-item">
                                <div class="info-label">邮箱</div>
                                <div class="info-value">cyber@example.com</div>
                            </div>
                            
                            <div class="info-item">
                                <div class="info-label">状态</div>
                                <div class="info-value">在线 🔗</div>
                            </div>
                        </div>
                        
                        <!-- 个人简介 -->
                        <div class="bio">
                            <h3 class="bio-title">// 个人简介</h3>
                            <p class="bio-text">
                                // 我是一名热爱技术的全栈开发者，专注于Web开发和数字艺术创作。<br>
                                // 拥有5年的编程经验，熟练掌握前端和后端开发技术。<br>
                                // 热衷于探索新技术，追求极致的用户体验和视觉效果。<br>
                                // 相信代码可以改变世界，致力于用技术创造更美好的未来。
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 自动高亮当前页面
        document.addEventListener('DOMContentLoaded', function() {
            const currentPage = window.location.pathname.split('/').pop() || 'index.html';
            const navLinks = document.querySelectorAll('.nav-link');
            navLinks.forEach(link => link.classList.remove('active'));
            navLinks.forEach(link => {
                if (link.getAttribute('href') === currentPage) {
                    link.classList.add('active');
                }
            });
        });
    </script>
</body>
</html>
