<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 声明文档类型为HTML5 -->
    <meta charset="UTF-8">
    <!-- 设置字符编码为UTF-8，支持中文显示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 响应式适配，viewport设置 -->
    <title>万灵抽卡 - 神魔皇妖集结</title>
    <!-- 网站标题【可修改】 -->
    
    <!-- 引入Bootstrap5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* ========== 全局CSS变量配置 ========== */
        /* 设置根元素CSS变量，方便统一修改配色【可修改颜色值】 */
        :root {
            /* 主色调 */
            --deep-black: #121212; /* 深空黑 - 主背景色 */
            --dark-gold: #D4AF37; /* 暗鎏金 - 强调色 */
            --fire-red: #E50914; /* 赤焰红 - 交互色 */
            --souls-gray: #2A2A2A; /* 魂系灰 - 次级背景 */
            --moon-silver: #C0C0C0; /* 月光银 - 文字色 */
            
            /* 神系配色（杨争） */
            --god-gold: #F9D71C; /* 神圣金 */
            --god-blue: #00A8E8; /* 天空蓝 */
            
            /* 皇系配色（郑涵文） */
            --emperor-red: #C70039; /* 威严红 */
            --emperor-gray: #909090; /* 暗银灰 */
            
            /* 妖系配色（田航） */
            --demon-cyan: #00C896; /* 妖异青 */
            --demon-black: #0A0A0A; /* 墨黑 */
            
            /* 魔系配色（张轲智） */
            --devil-purple: #8A2BE2; /* 魔焰紫 */
            --devil-darkred: #8B0000; /* 暗红 */
        }
        
        /* ========== 全局基础重置 ========== */
        /* 重置所有元素默认样式 */
        * {
            margin: 0; /* 清除外边距 */
            padding: 0; /* 清除内边距 */
            box-sizing: border-box; /* 盒模型统一 */
        }
        
        /* ========== 页面整体样式 ========== */
        /* 页面主体样式 */
        body {
            background-color: var(--deep-black); /* 深黑背景 */
            color: var(--moon-silver); /* 银色文字 */
            font-family: 'Microsoft YaHei', '微软雅黑', sans-serif; /* 字体设置【可修改字体】 */
            min-height: 100vh; /* 最小高度为视口高度 */
            overflow-x: hidden; /* 禁止横向滚动 */
            position: relative; /* 相对定位 */
        }
        
        /* ========== 动态背景双层纹理 ========== */
        /* 创建动态背景容器 - 符文层 */
        body::before {
            content: ''; /* 伪元素必须的属性 */
            position: fixed; /* 固定定位，不随滚动 */
            top: 0; /* 顶部对齐 */
            left: 0; /* 左侧对齐 */
            width: 100%; /* 全宽 */
            height: 100%; /* 全高 */
            /* 叠加渐变层 + 符文纹理【可修改透明度】 */
            background: 
                radial-gradient(ellipse at center, rgba(42, 42, 42, 0.3) 0%, transparent 70%),
                linear-gradient(45deg, rgba(18, 18, 18, 0.95) 0%, rgba(42, 42, 42, 0.85) 100%);
            z-index: -2; /* 置于底层 */
            animation: runeRotate 60s infinite linear; /* 符文缓慢旋转 */
        }
        
        /* 符文旋转动画 */
        @keyframes runeRotate {
            0% { transform: rotate(0deg); } /* 起始角度 */
            100% { transform: rotate(360deg); } /* 旋转一周 */
        }
        
        /* 创建动态背景容器 - 祥云层 */
        body::after {
            content: ''; /* 伪元素必须的属性 */
            position: fixed; /* 固定定位 */
            top: 0;
            left: 0;
            width: 200%; /* 双倍宽度实现流动 */
            height: 200%; /* 双倍高度 */
            /* 祥云纹理背景【可修改】 */
            background-image: 
                radial-gradient(ellipse at 20% 30%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(229, 9, 20, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 20%, rgba(138, 43, 226, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 80%, rgba(0, 200, 150, 0.05) 0%, transparent 50%);
            z-index: -1; /* 置于符文层之上 */
            animation: cloudFlow 40s infinite linear; /* 祥云流动动画 */
            pointer-events: none; /* 不影响点击 */
        }
        
        /* 祥云流动动画 */
        @keyframes cloudFlow {
            0% { transform: translate(0, 0); } /* 起始位置 */
            100% { transform: translate(-50%, -50%); } /* 移动到负方向 */
        }
        
        /* ========== 粒子特效层 ========== */
        /* 粒子容器 */
        .particles-layer {
            position: fixed; /* 固定定位 */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 不影响点击事件 */
            z-index: 1; /* 层级设置 */
            overflow: hidden; /* 隐藏溢出 */
        }
        
        /* 单个粒子样式 */
        .particle {
            position: absolute; /* 绝对定位 */
            width: 2px; /* 粒子宽度【可修改】 */
            height: 2px; /* 粒子高度【可修改】 */
            background: var(--dark-gold); /* 鎏金色粒子 */
            border-radius: 50%; /* 圆形 */
            box-shadow: 0 0 6px var(--dark-gold); /* 发光效果 */
            animation: particleFloat 10s infinite linear; /* 浮动动画 */
            opacity: 0.6; /* 初始透明度 */
        }
        
        /* 粒子浮动动画 */
        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) rotate(0deg); /* 从底部开始 */
                opacity: 0; /* 初始透明 */
            }
            10% { opacity: 0.6; } /* 渐显 */
            90% { opacity: 0.6; } /* 保持可见 */
            100% {
                transform: translateY(-100vh) rotate(720deg); /* 到顶部消失 */
                opacity: 0; /* 渐隐 */
            }
        }
        
        /* ========== 角落装饰元素 ========== */
        /* 左上角装饰 */
        .corner-decoration {
            position: fixed; /* 固定定位 */
            width: 150px; /* 宽度【可修改】 */
            height: 150px; /* 高度【可修改】 */
            pointer-events: none; /* 不影响点击 */
            z-index: 0; /* 层级 */
            opacity: 0.15; /* 透明度 */
        }
        
        .corner-top-left {
            top: 20px; /* 距顶部 */
            left: 20px; /* 距左侧 */
            border-left: 2px solid var(--dark-gold); /* 左边框 */
            border-top: 2px solid var(--dark-gold); /* 上边框 */
            border-top-left-radius: 20px; /* 左上圆角 */
        }
        
        .corner-top-right {
            top: 20px;
            right: 20px;
            border-right: 2px solid var(--dark-gold);
            border-top: 2px solid var(--dark-gold);
            border-top-right-radius: 20px;
        }
        
        .corner-bottom-left {
            bottom: 20px;
            left: 20px;
            border-left: 2px solid var(--dark-gold);
            border-bottom: 2px solid var(--dark-gold);
            border-bottom-left-radius: 20px;
        }
        
        .corner-bottom-right {
            bottom: 20px;
            right: 20px;
            border-right: 2px solid var(--dark-gold);
            border-bottom: 2px solid var(--dark-gold);
            border-bottom-right-radius: 20px;
        }
        
        /* ========== 顶部导航栏（CG风格） ========== */
        /* 导航栏整体样式 */
        .navbar-cg {
            background: linear-gradient(180deg, 
                rgba(18, 18, 18, 0.98) 0%, 
                rgba(42, 42, 42, 0.95) 100%); /* 磨砂渐变背景 */
            border-bottom: 2px solid transparent; /* 底部边框 */
            border-image: linear-gradient(90deg, 
                var(--god-gold), 
                var(--emperor-red), 
                var(--demon-cyan), 
                var(--devil-purple)) 1; /* 鎏金符文渐变边框 */
            box-shadow: 
                0 4px 30px rgba(212, 175, 55, 0.3), /* 外发光 */
                inset 0 1px 0 rgba(212, 175, 55, 0.2); /* 内发光 */
            padding: 12px 0; /* 上下内边距 */
            position: fixed; /* 固定在顶部 */
            width: 100%; /* 全宽 */
            top: 0; /* 顶部对齐 */
            z-index: 1000; /* 最高层级 */
            backdrop-filter: blur(10px); /* 磨砂效果 */
        }
        
        /* 导航栏装饰元素 */
        .navbar-cg::before {
            content: ''; /* 伪元素 */
            position: absolute; /* 绝对定位 */
            top: 0; /* 顶部 */
            left: 50%; /* 水平居中 */
            transform: translateX(-50%); /* 居中 */
            width: 60%; /* 宽度 */
            height: 1px; /* 高度 */
            background: linear-gradient(90deg, 
                transparent, 
                var(--dark-gold), 
                transparent); /* 渐变线 */
        }
        
        /* 导航栏悬停发光效果 */
        .navbar-cg:hover {
            box-shadow: 
                0 6px 40px rgba(212, 175, 55, 0.4),
                inset 0 1px 0 rgba(212, 175, 55, 0.3);
        }
        
        /* 网站CG风格标题 */
        .site-title-cg {
            font-size: 1.6rem; /* 字体大小【可修改】 */
            font-weight: 900; /* 加粗 */
            background: linear-gradient(135deg, 
                var(--god-gold) 0%, 
                var(--emperor-red) 33%, 
                var(--demon-cyan) 66%, 
                var(--devil-purple) 100%); /* 四色渐变 */
            -webkit-background-clip: text; /* 文字填充渐变 */
            background-clip: text;
            color: transparent; /* 透明以显示渐变 */
            letter-spacing: 4px; /* 字间距 */
            text-transform: uppercase; /* 大写 */
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3); /* 发光 */
            position: relative; /* 相对定位 */
            text-decoration: none; /* 去除下划线 */
        }
        
        /* 标题装饰符文 */
        .site-title-cg::before,
        .site-title-cg::after {
            content: '✦'; /* 符文符号【可修改】 */
            position: absolute; /* 绝对定位 */
            top: 50%; /* 垂直居中 */
            transform: translateY(-50%); /* 居中 */
            font-size: 0.6rem; /* 符文大小 */
            color: var(--dark-gold); /* 符文颜色 */
            text-shadow: 0 0 10px var(--dark-gold); /* 发光 */
            animation: runeBlink 2s infinite; /* 闪烁动画 */
        }
        
        .site-title-cg::before { left: -25px; } /* 左侧符文位置 */
        .site-title-cg::after { right: -25px; } /* 右侧符文位置 */
        
        /* 符文闪烁动画 */
        @keyframes runeBlink {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        /* 导航按钮样式 */
        .nav-btn-cg {
            color: var(--moon-silver) !important; /* 银色文字 */
            font-weight: bold; /* 加粗 */
            font-size: 0.85rem; /* 字体大小 */
            text-transform: uppercase; /* 大写 */
            letter-spacing: 2px; /* 字间距 */
            padding: 10px 25px !important; /* 内边距 */
            background: transparent; /* 透明背景 */
            border: 1px solid transparent; /* 边框 */
            position: relative; /* 相对定位 */
            overflow: hidden; /* 隐藏溢出 */
            transition: all 0.4s ease; /* 过渡动画 */
            text-decoration: none; /* 去除下划线 */
        }
        
        /* 导航按钮悬停效果 - 符文点亮 */
        .nav-btn-cg:hover {
            color: var(--dark-gold) !important; /* 鎏金色 */
            border: 1px solid var(--dark-gold); /* 边框 */
            text-shadow: 0 0 15px var(--dark-gold); /* 文字发光 */
            transform: translateY(-2px); /* 上浮 */
            box-shadow: 
                0 0 20px rgba(212, 175, 55, 0.4), /* 外发光 */
                inset 0 0 20px rgba(212, 175, 55, 0.1); /* 内发光 */
        }
        
        /* 导航按钮点击效果 */
        .nav-btn-cg:active {
            transform: translateY(0); /* 复位 */
            box-shadow: inset 0 0 15px rgba(212, 175, 55, 0.3); /* 内发光 */
        }
        
        /* 汉堡菜单按钮（CG风格） */
        .navbar-toggler {
            border: 2px solid var(--dark-gold); /* 边框颜色 */
            border-radius: 8px; /* 圆角 */
            padding: 8px 12px; /* 内边距 */
            position: relative; /* 相对定位 */
        }
        
        /* 汉堡菜单悬停效果 */
        .navbar-toggler:hover {
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); /* 发光 */
            border-color: var(--god-gold); /* 边框变色 */
        }
        
        /* 汉堡菜单图标 */
        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='%23D4AF37' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3E%3C/svg%3E");
            /* 自定义鎏金色图标 */
        }
        
        /* 移动端菜单折叠区域 */
        .navbar-collapse {
            background: rgba(18, 18, 18, 0.98); /* 背景色 */
            border: 1px solid var(--dark-gold); /* 边框 */
            border-radius: 10px; /* 圆角 */
            margin-top: 15px; /* 上边距 */
            padding: 15px; /* 内边距 */
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); /* 发光 */
        }
        
        /* ========== 主内容区域 ========== */
        /* 主容器样式 */
        .main-container {
            padding-top: 100px; /* 顶部留出导航栏空间 */
            padding-bottom: 80px; /* 底部留出页脚空间 */
            min-height: 100vh; /* 最小高度 */
            position: relative; /* 相对定位 */
            z-index: 2; /* 层级 */
        }
        
        /* ========== 中央抽卡区域 ========== */
        /* 抽卡区域容器 */
        .draw-area {
            text-align: center; /* 居中对齐 */
            padding: 60px 20px; /* 内边距 */
            margin-bottom: 60px; /* 下边距 */
            position: relative; /* 相对定位 */
        }
        
        /* 抽卡区域装饰武器剪影 */
        .weapon-decoration {
            position: absolute; /* 绝对定位 */
            width: 80px; /* 宽度【可修改】 */
            height: 80px; /* 高度【可修改】 */
            opacity: 0.15; /* 透明度 */
            filter: drop-shadow(0 0 10px currentColor); /* 发光效果 */
        }
        
        /* 神系武器 - 左上 */
        .weapon-god {
            top: 20px; /* 距顶部 */
            left: 10%; /* 左侧位置 */
            color: var(--god-gold); /* 神圣金色 */
        }
        
        /* 皇系武器 - 右上 */
        .weapon-emperor {
            top: 20px;
            right: 10%;
            color: var(--emperor-red);
        }
        
        /* 妖系武器 - 左下 */
        .weapon-demon {
            bottom: 20px;
            left: 10%;
            color: var(--demon-cyan);
        }
        
        /* 魔系武器 - 右下 */
        .weapon-devil {
            bottom: 20px;
            right: 10%;
            color: var(--devil-purple);
        }
        
        /* 抽卡标题样式 */
        .draw-title {
            font-size: 3.5rem; /* 字体大小【可修改】 */
            font-weight: 900; /* 加粗 */
            background: linear-gradient(135deg, 
                var(--god-gold) 0%, 
                var(--emperor-red) 25%, 
                var(--demon-cyan) 50%, 
                var(--devil-purple) 75%, 
                var(--god-gold) 100%); /* 五色渐变 */
            background-size: 200% auto; /* 背景大小 */
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px; /* 下边距 */
            letter-spacing: 8px; /* 字间距 */
            animation: titleGradient 4s linear infinite; /* 渐变流动动画 */
            text-shadow: 0 0 40px rgba(212, 175, 55, 0.3); /* 发光 */
            position: relative; /* 相对定位 */
            z-index: 10; /* 层级 */
        }
        
        /* 标题渐变流动动画 */
        @keyframes titleGradient {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        
        /* 抽卡副标题 */
        .draw-subtitle {
            font-size: 1.1rem; /* 字体大小 */
            color: var(--moon-silver); /* 银色 */
            margin-bottom: 50px; /* 下边距 */
            letter-spacing: 3px; /* 字间距 */
            text-shadow: 0 0 10px rgba(192, 192, 192, 0.3); /* 发光 */
            opacity: 0.8; /* 透明度 */
        }
        
        /* ========== 3D抽卡按钮 ========== */
        /* 抽卡按钮容器 */
        .draw-btn-container {
            position: relative; /* 相对定位 */
            display: inline-block; /* 行内块 */
            margin: 30px 0; /* 上下边距 */
        }
        
        /* 圆形魔法阵底座 */
        .magic-circle-base {
            position: absolute; /* 绝对定位 */
            bottom: -30px; /* 底部位置 */
            left: 50%; /* 水平居中 */
            transform: translateX(-50%); /* 居中 */
            width: 300px; /* 宽度【可修改】 */
            height: 80px; /* 高度【可修改】 */
            background: radial-gradient(ellipse at center, 
                rgba(212, 175, 55, 0.3) 0%, 
                transparent 70%); /* 径向渐变 */
            border-radius: 50%; /* 圆形 */
            filter: blur(15px); /* 模糊效果 */
            animation: baseFloat 3s ease-in-out infinite; /* 悬浮动画 */
        }
        
        /* 底座悬浮动画 */
        @keyframes baseFloat {
            0%, 100% { 
                transform: translateX(-50%) translateY(0); 
                opacity: 0.5;
            }
            50% { 
                transform: translateX(-50%) translateY(-10px); 
                opacity: 0.8;
            }
        }
        
        /* 抽卡按钮主体（3D立体设计） */
        .draw-btn-3d {
            position: relative; /* 相对定位 */
            padding: 25px 70px; /* 内边距【可修改按钮大小】 */
            font-size: 1.4rem; /* 字体大小 */
            font-weight: 900; /* 加粗 */
            color: var(--deep-black); /* 文字颜色 */
            background: linear-gradient(180deg, 
                #F4CF47 0%, 
                var(--dark-gold) 50%, 
                #8B6914 100%); /* 3D鎏金渐变 */
            border: none; /* 无边框 */
            border-radius: 15px; /* 圆角 */
            cursor: pointer; /* 鼠标指针 */
            text-transform: uppercase; /* 大写 */
            letter-spacing: 4px; /* 字间距 */
            /* 3D阴影效果 */
            box-shadow: 
                0 6px 0 #6B4F0F, /* 底部阴影（立体感） */
                0 8px 20px rgba(0, 0, 0, 0.4), /* 外阴影 */
                0 0 40px rgba(212, 175, 55, 0.5), /* 外发光 */
                inset 0 2px 0 rgba(255, 255, 255, 0.3), /* 顶部高光 */
                inset 0 -2px 0 rgba(0, 0, 0, 0.2); /* 底部阴影 */
            transition: all 0.15s ease; /* 过渡 */
            overflow: hidden; /* 隐藏溢出 */
            z-index: 1; /* 层级 */
        }
        
        /* 按钮符文纹理 */
        .draw-btn-3d::before {
            content: '☰ ☱ ☲ ☳'; /* 符文图案【可修改】 */
            position: absolute; /* 绝对定位 */
            top: 50%; /* 垂直居中 */
            left: 50%; /* 水平居中 */
            transform: translate(-50%, -50%); /* 居中 */
            font-size: 0.6rem; /* 符文大小 */
            color: rgba(0, 0, 0, 0.15); /* 符文颜色 */
            letter-spacing: 20px; /* 字间距 */
            white-space: nowrap; /* 不换行 */
            pointer-events: none; /* 不影响点击 */
        }
        
        /* 按钮悬停效果 */
        .draw-btn-3d:hover {
            transform: translateY(-3px); /* 上浮 */
            box-shadow: 
                0 9px 0 #6B4F0F,
                0 12px 30px rgba(0, 0, 0, 0.5),
                0 0 60px rgba(212, 175, 55, 0.7),
                inset 0 2px 0 rgba(255, 255, 255, 0.4),
                inset 0 -2px 0 rgba(0, 0, 0, 0.2);
        }
        
        /* 按钮点击效果（下陷） */
        .draw-btn-3d:active {
            transform: translateY(3px); /* 下陷 */
            box-shadow: 
                0 3px 0 #6B4F0F,
                0 4px 10px rgba(0, 0, 0, 0.4),
                0 0 30px rgba(212, 175, 55, 0.5),
                inset 0 2px 0 rgba(0, 0, 0, 0.2),
                inset 0 -2px 0 rgba(255, 255, 255, 0.2);
        }
        
        /* 按钮外圈发光动画 */
        .draw-btn-container::before {
            content: ''; /* 伪元素 */
            position: absolute; /* 绝对定位 */
            top: -8px; /* 顶部位置 */
            left: -8px; /* 左侧位置 */
            right: -8px; /* 右侧位置 */
            bottom: -8px; /* 底部位置 */
            background: linear-gradient(45deg, 
                var(--god-gold), 
                var(--emperor-red), 
                var(--demon-cyan), 
                var(--devil-purple), 
                var(--god-gold)); /* 四色渐变 */
            background-size: 400% 400%; /* 背景大小 */
            border-radius: 20px; /* 圆角 */
            z-index: -1; /* 底层 */
            animation: borderGlow 3s ease infinite; /* 发光动画 */
            opacity: 0.6; /* 透明度 */
            filter: blur(3px); /* 模糊 */
        }
        
        /* 边框发光动画 */
        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* ========== 抽卡动画区域 ========== */
        /* 抽卡动画容器 */
        .draw-animation-area {
            min-height: 400px; /* 最小高度【可修改】 */
            display: flex; /* 弹性布局 */
            align-items: center; /* 垂直居中 */
            justify-content: center; /* 水平居中 */
            position: relative; /* 相对定位 */
            perspective: 1000px; /* 3D透视 */
        }
        
        /* 魔法阵 */
        .magic-circle {
            position: absolute; /* 绝对定位 */
            width: 400px; /* 宽度【可修改】 */
            height: 400px; /* 高度【可修改】 */
            border: 3px solid var(--dark-gold); /* 边框 */
            border-radius: 50%; /* 圆形 */
            opacity: 0; /* 初始隐藏 */
            pointer-events: none; /* 不影响点击 */
            display: none; /* 默认隐藏 */
        }
        
        /* 魔法阵内圈 */
        .magic-circle::before {
            content: ''; /* 伪元素 */
            position: absolute; /* 绝对定位 */
            top: 20px; /* 距顶部 */
            left: 20px; /* 距左侧 */
            right: 20px; /* 距右侧 */
            bottom: 20px; /* 距底部 */
            border: 2px solid var(--dark-gold); /* 边框 */
            border-radius: 50%; /* 圆形 */
        }
        
        /* 魔法阵符文 */
        .magic-circle::after {
            content: '✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧'; /* 符文 */
            position: absolute; /* 绝对定位 */
            top: 50%; /* 垂直居中 */
            left: 50%; /* 水平居中 */
            transform: translate(-50%, -50%); /* 居中 */
            font-size: 1.5rem; /* 字体大小 */
            color: var(--dark-gold); /* 颜色 */
            letter-spacing: 30px; /* 字间距 */
            text-shadow: 0 0 20px var(--dark-gold); /* 发光 */
        }
        
        /* 魔法阵动画 */
        @keyframes circleRotate {
            0% { transform: rotate(0deg) scale(0.5); opacity: 0; }
            50% { transform: rotate(180deg) scale(1); opacity: 1; }
            100% { transform: rotate(360deg) scale(1); opacity: 1; }
        }
        
        /* 结果卡片样式 */
        .result-card {
            width: 280px; /* 宽度【可修改】 */
            height: 420px; /* 高度【可修改】 */
            background: linear-gradient(180deg, 
                var(--souls-gray) 0%, 
                var(--deep-black) 100%); /* 渐变背景 */
            border: 3px solid var(--dark-gold); /* 鎏金边框 */
            border-radius: 20px; /* 圆角 */
            box-shadow: 
                0 0 40px rgba(212, 175, 55, 0.6), /* 外发光 */
                inset 0 0 40px rgba(212, 175, 55, 0.1); /* 内发光 */
            display: none; /* 默认隐藏 */
            flex-direction: column; /* 纵向排列 */
            align-items: center; /* 居中 */
            padding: 20px; /* 内边距 */
            position: relative; /* 相对定位 */
            cursor: pointer; /* 可点击 */
            transition: all 0.3s ease; /* 过渡 */
            transform-style: preserve-3d; /* 保持3D效果 */
        }
        
        /* 结果卡片悬停效果 */
        .result-card:hover {
            transform: translateY(-15px) scale(1.05); /* 上浮放大 */
            box-shadow: 
                0 20px 60px rgba(212, 175, 55, 0.8),
                inset 0 0 50px rgba(212, 175, 55, 0.2);
        }
        
        /* 卡片翻转动画 */
        @keyframes cardFlip {
            0% { 
                transform: rotateY(180deg) scale(0.3); 
                opacity: 0; 
            }
            50% { 
                transform: rotateY(90deg) scale(0.8); 
                opacity: 0.5; 
            }
            100% { 
                transform: rotateY(0deg) scale(1); 
                opacity: 1; 
            }
        }
        
        /* 结果卡片图片区域 */
        .result-card-image {
            width: 100%; /* 全宽 */
            height: 280px; /* 高度【可修改】 */
            background: linear-gradient(135deg, 
                var(--souls-gray) 0%, 
                var(--deep-black) 100%); /* 渐变背景 */
            border-radius: 15px; /* 圆角 */
            margin-bottom: 20px; /* 下边距 */
            overflow: hidden; /* 隐藏溢出 */
            border: 2px solid var(--dark-gold); /* 边框 */
            position: relative; /* 相对定位 */
        }
        
        /* 结果卡片图片 */
        .result-card-image img {
            width: 100%; /* 全宽 */
            height: 100%; /* 全高 */
            object-fit: cover; /* 图片填充方式 */
            transition: transform 0.5s ease; /* 过渡 */
        }
        
        /* 图片悬停放大 */
        .result-card:hover .result-card-image img {
            transform: scale(1.1); /* 放大 */
        }
        
        /* 结果卡片角色名 */
        .result-card-name {
            font-size: 1.8rem; /* 字体大小 */
            font-weight: 900; /* 加粗 */
            background: linear-gradient(135deg, 
                var(--god-gold) 0%, 
                var(--emperor-red) 100%); /* 渐变色 */
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.8); /* 发光 */
            margin-bottom: 8px; /* 下边距 */
            letter-spacing: 3px; /* 字间距 */
        }
        
        /* 结果卡片角色前缀 */
        .result-card-prefix {
            font-size: 0.9rem; /* 字体大小 */
            color: var(--moon-silver); /* 银色 */
            text-shadow: 0 0 10px rgba(192, 192, 192, 0.5); /* 发光 */
            letter-spacing: 2px; /* 字间距 */
        }
        
        /* 点击提示 */
        .result-card-hint {
            position: absolute; /* 绝对定位 */
            bottom: 15px; /* 底部位置 */
            font-size: 0.75rem; /* 字体大小 */
            color: var(--fire-red); /* 赤焰红 */
            animation: hintPulse 1.5s infinite; /* 脉冲动画 */
        }
        
        /* 提示脉冲动画 */
        @keyframes hintPulse {
            0%, 100% { opacity: 1; transform: translateY(0); }
            50% { opacity: 0.5; transform: translateY(-3px); }
        }
        
        /* ========== 抽卡提示弹窗 ========== */
        /* 提示弹窗容器 */
        .draw-popup {
            position: fixed; /* 固定定位 */
            top: 50%; /* 垂直居中 */
            left: 50%; /* 水平居中 */
            transform: translate(-50%, -50%) scale(0); /* 初始缩小 */
            background: linear-gradient(180deg, 
                rgba(42, 42, 42, 0.98) 0%, 
                rgba(18, 18, 18, 0.98) 100%); /* 磨砂背景 */
            border: 2px solid var(--dark-gold); /* 鎏金边框 */
            border-radius: 20px; /* 圆角 */
            padding: 30px 50px; /* 内边距 */
            z-index: 10000; /* 最高层级 */
            box-shadow: 
                0 0 50px rgba(212, 175, 55, 0.8), /* 外发光 */
                0 20px 60px rgba(0, 0, 0, 0.5); /* 阴影 */
            opacity: 0; /* 初始透明 */
            transition: all 0.3s ease; /* 过渡 */
            pointer-events: none; /* 不影响点击 */
        }
        
        /* 提示弹窗显示状态 */
        .draw-popup.show {
            transform: translate(-50%, -50%) scale(1); /* 正常大小 */
            opacity: 1; /* 完全显示 */
            pointer-events: auto; /* 可点击 */
        }
        
        /* 提示弹窗文字 */
        .draw-popup-text {
            font-size: 1.5rem; /* 字体大小 */
            font-weight: bold; /* 加粗 */
            color: var(--dark-gold); /* 鎏金色 */
            text-shadow: 0 0 20px var(--dark-gold); /* 发光 */
            letter-spacing: 3px; /* 字间距 */
        }
        
        /* 已拥有提示 */
        .draw-popup.owned {
            border-color: var(--souls-gray); /* 灰色边框 */
        }
        
        .draw-popup.owned .draw-popup-text {
            color: var(--moon-silver); /* 银色文字 */
            text-shadow: none; /* 无发光 */
        }
        
        /* ========== 抽卡规则提示 ========== */
        /* 规则提示容器 */
        .rule-tip {
            position: fixed; /* 固定定位 */
            bottom: 120px; /* 底部位置 */
            right: 20px; /* 右侧位置 */
            background: rgba(42, 42, 42, 0.9); /* 背景 */
            border: 1px solid var(--dark-gold); /* 边框 */
            border-radius: 10px; /* 圆角 */
            padding: 15px 20px; /* 内边距 */
            max-width: 280px; /* 最大宽度 */
            z-index: 100; /* 层级 */
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); /* 发光 */
        }
        
        /* 规则标题 */
        .rule-tip-title {
            font-size: 0.9rem; /* 字体大小 */
            font-weight: bold; /* 加粗 */
            color: var(--dark-gold); /* 鎏金色 */
            margin-bottom: 10px; /* 下边距 */
            letter-spacing: 2px; /* 字间距 */
        }
        
        /* 规则内容 */
        .rule-tip-content {
            font-size: 0.8rem; /* 字体大小 */
            color: var(--moon-silver); /* 银色 */
            line-height: 1.6; /* 行高 */
            opacity: 0.8; /* 透明度 */
        }
        
        /* 关闭按钮 */
        .rule-tip-close {
            position: absolute; /* 绝对定位 */
            top: 10px; /* 顶部位置 */
            right: 10px; /* 右侧位置 */
            background: none; /* 无背景 */
            border: none; /* 无边框 */
            color: var(--moon-silver); /* 颜色 */
            cursor: pointer; /* 鼠标指针 */
            font-size: 1.2rem; /* 字体大小 */
            transition: color 0.3s; /* 过渡 */
        }
        
        .rule-tip-close:hover {
            color: var(--fire-red); /* 悬停变色 */
        }
        
        /* ========== 卡槽区域 ========== */
        /* 卡槽区域容器 */
        .card-slot-area {
            background: linear-gradient(180deg, 
                rgba(42, 42, 42, 0.6) 0%, 
                rgba(18, 18, 18, 0.8) 100%); /* 渐变背景 */
            border-top: 3px solid transparent; /* 顶部边框 */
            border-image: linear-gradient(90deg, 
                transparent, 
                var(--dark-gold), 
                transparent) 1; /* 鎏金渐变边框 */
            border-bottom: 3px solid var(--dark-gold); /* 底部鎏金边框 */
            padding: 40px 0 60px; /* 上下内边距 */
            position: relative; /* 相对定位 */
            box-shadow: 
                0 -10px 30px rgba(0, 0, 0, 0.3), /* 上方阴影 */
                inset 0 10px 30px rgba(212, 175, 55, 0.05); /* 内发光 */
        }
        
        /* 卡槽区域标题（CG风格） */
        .slot-title-cg {
            text-align: center; /* 居中 */
            font-size: 1.8rem; /* 字体大小 */
            font-weight: 900; /* 加粗 */
            background: linear-gradient(90deg, 
                var(--god-gold) 0%, 
                var(--dark-gold) 50%, 
                var(--god-gold) 100%); /* 渐变色 */
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 30px; /* 下边距 */
            letter-spacing: 6px; /* 字间距 */
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.5); /* 发光 */
            position: relative; /* 相对定位 */
        }
        
        /* 卡槽标题装饰 */
        .slot-title-cg::before,
        .slot-title-cg::after {
            content: '━━━'; /* 装饰线 */
            position: absolute; /* 绝对定位 */
            top: 50%; /* 垂直居中 */
            transform: translateY(-50%); /* 居中 */
            font-size: 0.5rem; /* 字体大小 */
            color: var(--dark-gold); /* 颜色 */
            opacity: 0.5; /* 透明度 */
            letter-spacing: 0; /* 字间距 */
        }
        
        .slot-title-cg::before { left: 15%; } /* 左侧装饰位置 */
        .slot-title-cg::after { right: 15%; } /* 右侧装饰位置 */
        
        /* 卡槽容器 */
        .slot-container {
            display: flex; /* 弹性布局 */
            justify-content: center; /* 居中 */
            gap: 25px; /* 间距 */
            padding: 0 20px; /* 左右内边距 */
            overflow-x: auto; /* 横向滚动 */
            padding-bottom: 20px; /* 底部内边距 */
            scroll-behavior: smooth; /* 平滑滚动 */
        }
        
        /* 滚动条样式 */
        .slot-container::-webkit-scrollbar {
            height: 6px; /* 高度 */
        }
        
        .slot-container::-webkit-scrollbar-track {
            background: var(--souls-gray); /* 轨道颜色 */
            border-radius: 3px; /* 圆角 */
        }
        
        .slot-container::-webkit-scrollbar-thumb {
            background: var(--dark-gold); /* 滑块颜色 */
            border-radius: 3px; /* 圆角 */
        }
        
        /* 单个卡槽样式 */
        .card-slot {
            min-width: 200px; /* 最小宽度【可修改】 */
            height: 300px; /* 高度【可修改】 */
            background: linear-gradient(180deg, 
                rgba(42, 42, 42, 0.9) 0%, 
                rgba(18, 18, 18, 0.95) 100%); /* 渐变背景 */
            border: 2px dashed rgba(192, 192, 192, 0.3); /* 虚线边框 */
            border-radius: 15px; /* 圆角 */
            display: flex; /* 弹性布局 */
            flex-direction: column; /* 纵向排列 */
            align-items: center; /* 居中 */
            justify-content: center; /* 居中 */
            transition: all 0.4s ease; /* 过渡 */
            position: relative; /* 相对定位 */
            overflow: hidden; /* 隐藏溢出 */
        }
        
        /* 空卡槽提示 */
        .empty-slot-text {
            color: var(--moon-silver); /* 银色 */
            font-size: 0.9rem; /* 字体大小 */
            text-align: center; /* 居中 */
            opacity: 0.4; /* 半透明 */
            letter-spacing: 2px; /* 字间距 */
        }
        
        /* 空卡槽序号 */
        .empty-slot-number {
            font-size: 3rem; /* 字体大小 */
            font-weight: bold; /* 加粗 */
            color: var(--souls-gray); /* 颜色 */
            opacity: 0.2; /* 透明度 */
            margin-top: 10px; /* 上边距 */
        }
        
        /* 已填充卡槽样式 */
        .card-slot.filled {
            border: 2px solid var(--dark-gold); /* 实线边框 */
            cursor: pointer; /* 可点击 */
            box-shadow: 
                0 0 30px rgba(212, 175, 55, 0.4), /* 外发光 */
                inset 0 0 20px rgba(212, 175, 55, 0.1); /* 内发光 */
            animation: slotGlow 2s ease-in-out infinite; /* 发光动画 */
        }
        
        /* 卡槽发光动画 */
        @keyframes slotGlow {
            0%, 100% { box-shadow: 0 0 30px rgba(212, 175, 55, 0.4), inset 0 0 20px rgba(212, 175, 55, 0.1); }
            50% { box-shadow: 0 0 50px rgba(212, 175, 55, 0.6), inset 0 0 30px rgba(212, 175, 55, 0.2); }
        }
        
        /* 已填充卡槽悬停效果 */
        .card-slot.filled:hover {
            transform: translateY(-15px) scale(1.05); /* 上浮放大 */
            box-shadow: 
                0 20px 50px rgba(212, 175, 55, 0.6),
                inset 0 0 30px rgba(212, 175, 55, 0.2);
        }
        
        /* 卡槽角色图片 */
        .slot-character-image {
            width: 100%; /* 全宽 */
            height: 220px; /* 高度 */
            object-fit: cover; /* 填充方式 */
            border-radius: 12px 12px 0 0; /* 圆角 */
        }
        
        /* 卡槽角色名称 */
        .slot-character-name {
            padding: 12px; /* 内边距 */
            font-size: 1.1rem; /* 字体大小 */
            font-weight: bold; /* 加粗 */
            background: linear-gradient(135deg, 
                var(--god-gold) 0%, 
                var(--emperor-red) 100%); /* 渐变色 */
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center; /* 居中 */
            letter-spacing: 2px; /* 字间距 */
        }
        
        /* 卡槽角色前缀 */
        .slot-character-prefix {
            font-size: 0.75rem; /* 字体大小 */
            color: var(--moon-silver); /* 银色 */
            text-align: center; /* 居中 */
            opacity: 0.7; /* 透明度 */
            letter-spacing: 1px; /* 字间距 */
        }
        
        /* ========== 底部页脚 ========== */
        /* 页脚样式 */
        .footer-cg {
            background: linear-gradient(180deg, 
                var(--souls-gray) 0%, 
                var(--deep-black) 100%); /* 渐变背景 */
            border-top: 2px solid transparent; /* 顶部边框 */
            border-image: linear-gradient(90deg, 
                transparent, 
                var(--dark-gold), 
                transparent) 1; /* 鎏金渐变边框 */
            padding: 30px 0; /* 上下内边距 */
            text-align: center; /* 居中 */
            position: relative; /* 相对定位 */
        }
        
        /* 页脚装饰 */
        .footer-cg::before {
            content: '✦ ✧ ✦ ✧ ✦'; /* 符文装饰 */
            position: absolute; /* 绝对定位 */
            top: 10px; /* 顶部位置 */
            left: 50%; /* 水平居中 */
            transform: translateX(-50%); /* 居中 */
            font-size: 0.8rem; /* 字体大小 */
            color: var(--dark-gold); /* 颜色 */
            opacity: 0.3; /* 透明度 */
            letter-spacing: 20px; /* 字间距 */
        }
        
        /* 页脚标语 */
        .footer-slogan {
            color: var(--dark-gold); /* 鎏金色 */
            font-size: 1.1rem; /* 字体大小 */
            font-weight: bold; /* 加粗 */
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5); /* 发光 */
            letter-spacing: 4px; /* 字间距 */
            margin-bottom: 10px; /* 下边距 */
        }
        
        /* 页脚版权 */
        .footer-copyright {
            color: var(--moon-silver); /* 银色 */
            font-size: 0.8rem; /* 字体大小 */
            opacity: 0.6; /* 透明度 */
        }
        
        /* ========== 抽卡特效层 ========== */
        /* 抽卡特效容器 */
        .draw-effect-layer {
            position: fixed; /* 固定定位 */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 不影响点击 */
            z-index: 9999; /* 最高层级 */
            display: none; /* 默认隐藏 */
        }
        
        /* 金光粒子 */
        .gold-particle {
            position: absolute; /* 绝对定位 */
            width: 8px; /* 宽度 */
            height: 8px; /* 高度 */
            background: var(--dark-gold); /* 鎏金色 */
            border-radius: 50%; /* 圆形 */
            box-shadow: 0 0 15px var(--dark-gold); /* 发光 */
            animation: particleBurst 1s ease-out forwards; /* 爆发动画 */
        }
        
        /* 粒子爆发动画 */
        @keyframes particleBurst {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(1.5) translate(var(--tx), var(--ty));
                opacity: 0;
            }
        }
        
        /* 粒子雨特效 */
        .particle-rain {
            position: absolute; /* 绝对定位 */
            width: 4px; /* 宽度 */
            height: 15px; /* 高度 */
            background: linear-gradient(180deg, 
                var(--dark-gold), 
                transparent); /* 渐变色 */
            animation: rainFall 1s linear forwards; /* 下落动画 */
        }
        
        /* 粒子下落动画 */
        @keyframes rainFall {
            0% {
                transform: translateY(-100px);
                opacity: 1;
            }
            100% {
                transform: translateY(100px);
                opacity: 0;
            }
        }
        
        /* 屏幕震动效果 */
        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-5px, 5px); }
            50% { transform: translate(5px, -5px); }
            75% { transform: translate(-5px, -5px); }
        }
        
        .screen-shake {
            animation: screenShake 0.3s ease; /* 震动动画 */
        }
        
        /* ========== 响应式适配 ========== */
        /* 平板设备适配 */
        @media (max-width: 992px) {
            /* 抽卡标题缩小 */
            .draw-title {
                font-size: 2.5rem;
            }
            
            /* 抽卡按钮缩小 */
            .draw-btn-3d {
                padding: 20px 50px;
                font-size: 1.2rem;
            }
            
            /* 结果卡片缩小 */
            .result-card {
                width: 240px;
                height: 360px;
            }
            
            /* 卡槽宽度 */
            .card-slot {
                min-width: 180px;
                height: 270px;
            }
        }
        
        /* 手机设备适配 */
        @media (max-width: 576px) {
            /* 网站标题缩小 */
            .site-title-cg {
                font-size: 1.2rem;
            }
            
            /* 抽卡标题缩小 */
            .draw-title {
                font-size: 1.8rem;
            }
            
            /* 抽卡副标题缩小 */
            .draw-subtitle {
                font-size: 0.9rem;
            }
            
            /* 抽卡按钮缩小 */
            .draw-btn-3d {
                padding: 15px 35px;
                font-size: 1rem;
                letter-spacing: 2px;
            }
            
            /* 结果卡片缩小 */
            .result-card {
                width: 200px;
                height: 300px;
            }
            
            /* 卡槽宽度 */
            .card-slot {
                min-width: 150px;
                height: 230px;
            }
            
            /* 规则提示隐藏 */
            .rule-tip {
                display: none;
            }
            
            /* 武器装饰隐藏 */
            .weapon-decoration {
                display: none;
            }
            
            /* 角落装饰缩小 */
            .corner-decoration {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>
<body>
    <!-- ========== 粒子特效层 ========== -->
    <div class="particles-layer" id="particlesLayer">
        <!-- 粒子由JavaScript动态生成 -->
    </div>
    
    <!-- ========== 角落装饰元素 ========== -->
    <div class="corner-decoration corner-top-left"></div>
    <div class="corner-decoration corner-top-right"></div>
    <div class="corner-decoration corner-bottom-left"></div>
    <div class="corner-decoration corner-bottom-right"></div>
    
    <!-- ========== 抽卡特效层 ========== -->
    <div class="draw-effect-layer" id="drawEffectLayer">
        <!-- 抽卡特效由JavaScript动态生成 -->
    </div>
    
    <!-- ========== 抽卡提示弹窗 ========== -->
    <div class="draw-popup" id="drawPopup">
        <div class="draw-popup-text" id="drawPopupText">抽中：神·杨争</div>
    </div>
    
    <!-- ========== 顶部导航栏（CG风格） ========== -->
    <nav class="navbar navbar-expand-lg navbar-cg">
        <div class="container">
            <!-- 网站CG风格标题 -->
            <a class="navbar-brand site-title-cg" href="index.html">万灵抽卡</a>
            <!-- 【可修改网站名称】 -->
            
            <!-- 汉堡菜单按钮（移动端显示） -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" 
                    data-bs-target="#navbarNavCG" aria-controls="navbarNavCG" 
                    aria-expanded="false" aria-label="切换导航">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <!-- 导航菜单 -->
            <div class="collapse navbar-collapse" id="navbarNavCG">
                <ul class="navbar-nav ms-auto">
                    <!-- 角色图鉴按钮 -->
                    <li class="nav-item">
                        <a class="nav-btn-cg" href="role-list.html">角色图鉴</a>
                    </li>
                    <!-- 返回抽卡按钮 -->
                    <li class="nav-item">
                        <a class="nav-btn-cg" href="index.html">返回抽卡</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <!-- ========== 主内容区域 ========== -->
    <div class="main-container">
        <div class="container">
            
            <!-- ========== 中央抽卡区域 ========== -->
            <div class="draw-area">
                <!-- 装饰武器剪影 -->
                <div class="weapon-decoration weapon-god">⚔</div>
                <div class="weapon-decoration weapon-emperor">🗡</div>
                <div class="weapon-decoration weapon-demon">🔱</div>
                <div class="weapon-decoration weapon-devil">👹</div>
                
                <!-- 抽卡标题 -->
                <h1 class="draw-title">神魔皇妖集结</h1>
                <!-- 【可修改标题文字】 -->
                
                <!-- 抽卡副标题 -->
                <p class="draw-subtitle">// 召唤你的守护神灵，解锁专属传奇 //</p>
                <!-- 【可修改副标题文字】 -->
                
                <!-- 3D抽卡按钮 -->
                <div class="draw-btn-container">
                    <div class="magic-circle-base"></div>
                    <button class="draw-btn-3d" id="drawBtn" onclick="startDraw()">
                        唤神抽卡
                    </button>
                    <!-- 【可修改按钮文字】 -->
                </div>
                
                <!-- 抽卡动画区域 -->
                <div class="draw-animation-area">
                    <!-- 魔法阵 -->
                    <div class="magic-circle" id="magicCircle"></div>
                    
                    <!-- 结果卡片 -->
                    <div class="result-card" id="resultCard" onclick="goToRolePage()">
                        <div class="result-card-image">
                            <img id="resultImage" src="" alt="角色图片">
                            <!-- 图片由JavaScript动态设置 -->
                        </div>
                        <div class="result-card-name" id="resultName">神·杨争</div>
                        <div class="result-card-prefix" id="resultPrefix">神界守护者</div>
                        <div class="result-card-hint">点击查看详情</div>
                    </div>
                </div>
            </div>
            
        </div>
        
        <!-- ========== 卡槽区域 ========== -->
        <div class="card-slot-area">
            <div class="container">
                <!-- 卡槽区域标题（CG风格） -->
                <h2 class="slot-title-cg">已解锁角色</h2>
                <!-- 【可修改标题文字】 -->
                
                <!-- 卡槽容器 -->
                <div class="slot-container" id="slotContainer">
                    <!-- 默认4个空卡槽 -->
                    <div class="card-slot" id="slot1">
                        <div class="empty-slot-text">空位</div>
                        <div class="empty-slot-number">01</div>
                    </div>
                    <div class="card-slot" id="slot2">
                        <div class="empty-slot-text">空位</div>
                        <div class="empty-slot-number">02</div>
                    </div>
                    <div class="card-slot" id="slot3">
                        <div class="empty-slot-text">空位</div>
                        <div class="empty-slot-number">03</div>
                    </div>
                    <div class="card-slot" id="slot4">
                        <div class="empty-slot-text">空位</div>
                        <div class="empty-slot-number">04</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- ========== 抽卡规则提示 ========== -->
    <div class="rule-tip" id="ruleTip">
        <button class="rule-tip-close" onclick="closeRuleTip()">×</button>
        <div class="rule-tip-title">✦ 抽卡规则 ✦</div>
        <div class="rule-tip-content">
            • 共有4位神灵：神、皇、妖、魔<br>
            • 重复抽取同一角色时提示已拥有<br>
            • 点击已解锁角色可查看详情<br>
            • 抽卡记录自动保存，刷新不丢失
        </div>
    </div>
    
    <!-- ========== 底部页脚 ========== -->
    <footer class="footer-cg">
        <div class="container">
            <!-- 游戏风格标语 -->
            <p class="footer-slogan">抽中神魔皇妖，解锁专属传奇</p>
            <!-- 【可修改标语文字】 -->
            
            <!-- 版权信息 -->
            <p class="footer-copyright">© 2024 黑暗神话世界 · 保留所有权利</p>
            <!-- 【可修改版权信息】 -->
        </div>
    </footer>
    
    <!-- 引入Bootstrap5 JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- ========== JavaScript功能代码 ========== -->
    <script>
        // ========== 角色数据配置（固定，不可修改角色名称） ==========
        // 定义4个角色固定信息数组
        const roles = [
            {
                id: 1, // 角色ID
                name: "神·杨争", // 角色名称（神系）
                prefix: "神界守护者", // 角色前缀
                style: "god", // 风格标识：神系
                color: "#F9D71C", // 神圣金色
                image: "https://img0.baidu.com/it/u=2729945583,2501448413&fm=253&fmt=auto&app=138&f=JPEG?w=500&h=874", // 图片链接【可替换】
                page: "role1.html" // 跳转页面
            },
            {
                id: 2,
                name: "皇·郑涵文", // 角色名称（皇系）
                prefix: "皇室正统",
                style: "emperor",
                color: "#C70039", // 威严红
                image: "https://img1.baidu.com/it/u=1607391731,2027081262&fm=253&fmt=auto&app=138&f=JPEG?w=380&h=456",
                page: "role2.html"
            },
            {
                id: 3,
                name: "妖·田航", // 角色名称（妖系）
                prefix: "妖族首领",
                style: "demon",
                color: "#00C896", // 妖异青
                image: "https://img1.baidu.com/it/u=2975910297,1941252294&fm=253&fmt=auto&app=138&f=JPEG?w=500&h=889",
                page: "role3.html"
            },
            {
                id: 4,
                name: "魔·张轲智", // 角色名称（魔系）
                prefix: "魔界领主",
                style: "devil",
                color: "#8A2BE2", // 魔焰紫
                image: "https://img1.baidu.com/it/u=3712228048,150840169&fm=253&fmt=auto&app=138&f=JPEG?w=500&h=693",
                page: "role4.html"
            }
        ];
        
        // ========== 全局变量 ==========
        let drawnRoles = []; // 存储已抽中角色ID
        let currentDrawnRole = null; // 当前抽中的角色
        let isDrawing = false; // 抽卡动画进行中标志
        
        // ========== 页面加载时执行 ==========
        document.addEventListener('DOMContentLoaded', function() {
            // 从localStorage读取已抽中角色
            loadDrawnRoles();
            // 生成背景粒子
            createParticles();
            // 更新卡槽显示
            updateSlots();
        });
        
        // ========== 从localStorage加载已抽中角色 ==========
        function loadDrawnRoles() {
            const saved = localStorage.getItem('drawnRoles'); // 获取存储数据
            if (saved) {
                drawnRoles = JSON.parse(saved); // 解析JSON
            }
        }
        
        // ========== 保存已抽中角色到localStorage ==========
        function saveDrawnRoles() {
            localStorage.setItem('drawnRoles', JSON.stringify(drawnRoles)); // 存储为JSON
        }
        
        // ========== 创建背景粒子 ==========
        function createParticles() {
            const container = document.getElementById('particlesLayer'); // 获取粒子容器
            const particleCount = 40; // 粒子数量【可修改】
            
            // 循环创建粒子
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div'); // 创建div元素
                particle.className = 'particle'; // 添加类名
                particle.style.left = Math.random() * 100 + '%'; // 随机水平位置
                particle.style.animationDelay = Math.random() * 10 + 's'; // 随机延迟
                particle.style.animationDuration = (Math.random() * 6 + 8) + 's'; // 随机持续时间
                
                // 随机颜色
                const colors = ['#D4AF37', '#F9D71C', '#C70039', '#00C896', '#8A2BE2'];
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.boxShadow = `0 0 6px ${particle.style.background}`;
                
                container.appendChild(particle); // 添加到容器
            }
        }
        
        // ========== 开始抽卡（4阶段动画） ==========
        function startDraw() {
            // 防止重复点击
            if (isDrawing) return;
            isDrawing = true;
            
            const button = document.getElementById('drawBtn'); // 获取按钮
            button.disabled = true; // 禁用按钮
            button.textContent = '召唤中...'; // 修改文字
            
            // ===== 第1阶段：金光迸发（0.3秒）=====
            playStage1Effect();
            
            // ===== 第2阶段：魔法阵汇聚（0.7秒后）=====
            setTimeout(function() {
                playStage2Effect();
            }, 300);
            
            // ===== 第3阶段：卡片翻转（1秒后）=====
            setTimeout(function() {
                // 随机抽取角色
                const randomIndex = Math.floor(Math.random() * roles.length);
                const drawnRole = roles[randomIndex];
                currentDrawnRole = drawnRole;
                
                playStage3Effect(drawnRole);
            }, 1000);
            
            // ===== 第4阶段：卡片入槽（2秒后）=====
            setTimeout(function() {
                playStage4Effect();
                
                // 恢复按钮
                button.disabled = false;
                button.textContent = '唤神抽卡';
                isDrawing = false;
            }, 2000);
        }
        
        // ========== 第1阶段：金光迸发效果 ==========
        function playStage1Effect() {
            // 屏幕震动
            document.body.classList.add('screen-shake');
            setTimeout(function() {
                document.body.classList.remove('screen-shake');
            }, 300);
            
            // 金光粒子爆发
            const effectLayer = document.getElementById('drawEffectLayer');
            effectLayer.style.display = 'block';
            effectLayer.innerHTML = '';
            
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2 - 100;
            
            // 创建50个金光粒子
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'gold-particle';
                particle.style.left = centerX + 'px';
                particle.style.top = centerY + 'px';
                
                // 随机方向
                const angle = (Math.random() * 360) * (Math.PI / 180);
                const distance = 100 + Math.random() * 200;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                
                effectLayer.appendChild(particle);
            }
        }
        
        // ========== 第2阶段：魔法阵汇聚效果 ==========
        function playStage2Effect() {
            const circle = document.getElementById('magicCircle'); // 获取魔法阵
            circle.style.display = 'block';
            circle.style.opacity = '0';
            circle.style.animation = 'circleRotate 0.7s ease-out forwards';
        }
        
        // ========== 第3阶段：卡片翻转效果 ==========
        function playStage3Effect(role) {
            // 隐藏魔法阵
            const circle = document.getElementById('magicCircle');
            circle.style.display = 'none';
            
            // 粒子雨特效
            const effectLayer = document.getElementById('drawEffectLayer');
            for (let i = 0; i < 30; i++) {
                setTimeout(function() {
                    const rain = document.createElement('div');
                    rain.className = 'particle-rain';
                    rain.style.left = (40 + Math.random() * 20) + '%';
                    rain.style.top = '30%';
                    effectLayer.appendChild(rain);
                }, i * 50);
            }
            
            // 显示结果卡片
            const card = document.getElementById('resultCard');
            const image = document.getElementById('resultImage');
            const name = document.getElementById('resultName');
            const prefix = document.getElementById('resultPrefix');
            
            image.src = role.image;
            name.textContent = role.name;
            prefix.textContent = role.prefix;
            
            card.style.display = 'flex';
            card.style.animation = 'cardFlip 1s ease-out forwards';
            
            // 根据角色风格设置边框颜色
            card.style.borderColor = role.color;
            card.style.boxShadow = `0 0 40px ${role.color}80, inset 0 0 40px ${role.color}20`;
        }
        
        // ========== 第4阶段：卡片入槽效果 ==========
        function playStage4Effect() {
            // 隐藏特效层
            const effectLayer = document.getElementById('drawEffectLayer');
            effectLayer.style.display = 'none';
            effectLayer.innerHTML = '';
            
            // 显示提示弹窗
            const popup = document.getElementById('drawPopup');
            const popupText = document.getElementById('drawPopupText');
            
            // 检查是否已拥有
            if (drawnRoles.includes(currentDrawnRole.id)) {
                // 已拥有该角色
                popup.classList.add('owned');
                popupText.textContent = '已拥有该角色';
            } else {
                // 新获得角色
                popup.classList.remove('owned');
                popupText.textContent = `抽中：${currentDrawnRole.name}`;
                
                // 添加到已抽中列表
                drawnRoles.push(currentDrawnRole.id);
                saveDrawnRoles();
                updateSlots();
            }
            
            // 显示弹窗
            popup.classList.add('show');
            
            // 0.5秒后隐藏弹窗
            setTimeout(function() {
                popup.classList.remove('show');
            }, 1500);
        }
        
        // ========== 跳转到角色页面 ==========
        function goToRolePage() {
            if (currentDrawnRole) {
                window.location.href = currentDrawnRole.page; // 跳转
            }
        }
        
        // ========== 更新卡槽显示 ==========
        function updateSlots() {
            // 遍历4个卡槽
            for (let i = 1; i <= 4; i++) {
                const slot = document.getElementById('slot' + i);
                
                if (i <= drawnRoles.length) {
                    // 已填充
                    const roleId = drawnRoles[i - 1];
                    const roleData = roles.find(r => r.id === roleId);
                    
                    slot.innerHTML = `
                        <img class="slot-character-image" src="${roleData.image}" alt="${roleData.name}">
                        <div class="slot-character-name">${roleData.name}</div>
                        <div class="slot-character-prefix">${roleData.prefix}</div>
                    `;
                    
                    slot.classList.add('filled');
                    slot.style.borderColor = roleData.color;
                    
                    // 点击事件（闭包）
                    slot.onclick = (function(data) {
                        return function() {
                            window.location.href = data.page;
                        };
                    })(roleData);
                } else {
                    // 空卡槽
                    slot.innerHTML = `
                        <div class="empty-slot-text">空位</div>
                        <div class="empty-slot-number">0${i}</div>
                    `;
                    slot.classList.remove('filled');
                    slot.style.borderColor = '';
                    slot.onclick = null;
                }
            }
        }
        
        // ========== 关闭规则提示 ==========
        function closeRuleTip() {
            const tip = document.getElementById('ruleTip');
            tip.style.display = 'none';
        }
        
        // ========== 清除所有抽卡记录（调试用）==========
        function clearAllDrawn() {
            localStorage.removeItem('drawnRoles');
            drawnRoles = [];
            updateSlots();
            document.getElementById('resultCard').style.display = 'none';
            alert('已清除所有召唤记录！');
        }
    </script>
</body>
