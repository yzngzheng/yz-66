<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能 - 赛博空间</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            font-family: 'Courier New', monospace;
            color: #00ffff;
        }
        
        /* 导航栏样式（与之前一致） */
        .navbar-cyber {
            background: linear-gradient(180deg, #0d0d15 0%, rgba(13, 13, 21, 0.95) 100%);
            border-bottom: 2px solid;
            border-image: linear-gradient(90deg, #ff00ff, #00ffff, #ff00ff) 1;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3), 0 0 40px rgba(0, 255, 255, 0.2);
            padding: 15px 0;
            position: relative;
            overflow: hidden;
        }
        
        .navbar-cyber::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ffff, transparent);
            animation: scan 3s infinite linear;
        }
        
        @keyframes scan {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        
        .navbar-brand {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            position: relative;
        }
        
        .navbar-brand::before, .navbar-brand::after {
            content: 'CYBER';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .navbar-brand::before {
            animation: glitch-1 0.3s infinite linear alternate-reverse;
            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
        }
        
        .navbar-brand::after {
            animation: glitch-2 0.3s infinite linear alternate-reverse;
            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
        }
        
        @keyframes glitch-1 {
            0% { transform: translate(0); }
            100% { transform: translate(-3px, -3px); }
        }
        
        @keyframes glitch-2 {
            0% { transform: translate(0); }
            100% { transform: translate(3px, 3px); }
        }
        
        .nav-link {
            color: #00ffff !important;
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 10px 25px !important;
            margin: 0 5px;
            border: 1px solid transparent;
            border-image: linear-gradient(90deg, #ff00ff, #00ffff) 1;
            transition: all 0.3s ease;
            background: rgba(0, 255, 255, 0.05);
        }
        
        .nav-link:hover {
            color: #ff00ff !important;
            background: rgba(255, 0, 255, 0.1);
            text-shadow: 0 0 10px #ff00ff;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.5);
            transform: translateY(-2px);
        }
        
        .nav-link.active {
            background: linear-gradient(90deg, rgba(255, 0, 255, 0.2), rgba(0, 255, 255, 0.2));
            color: #00ffff !important;
            text-shadow: 0 0 10px #00ffff;
            border: 1px solid #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
            animation: neon-pulse 2s infinite ease-in-out;
        }
        
        @keyframes neon-pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 255, 0.6); }
            50% { box-shadow: 0 0 30px rgba(0, 255, 255, 0.8); }
        }
        
        .navbar-toggler {
            border: 2px solid #00ffff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        
        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='%2300ffff' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }
        
        .navbar-collapse {
            background: rgba(10, 10, 15, 0.98);
            border: 1px solid;
            border-image: linear-gradient(90deg, #ff00ff, #00ffff) 1;
            margin-top: 10px;
            padding: 15px;
        }
        
        @media (max-width: 991px) {
            .nav-link {
                margin: 5px 0;
                text-align: center;
                border: 1px solid;
                border-image: linear-gradient(90deg, #ff00ff, #00ffff) 1;
            }
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: -1;
        }
        
        /* 技能页面样式 */
        .skills-section {
            padding-top: 120px;
            padding-bottom: 60px;
            min-height: 100vh;
        }
        
        .section-title {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        
        .skill-category {
            margin-bottom: 40px;
        }
        
        .category-title {
            font-size: 1.5rem;
            color: #ff00ff;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.8);
            border-left: 4px solid #ff00ff;
            padding-left: 15px;
        }
        
        .skill-item {
            margin-bottom: 25px;
            background: rgba(0, 255, 255, 0.05);
            padding: 20px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .skill-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 0, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }
        
        .skill-item:hover::before {
            left: 100%;
        }
        
        .skill-item:hover {
            border-color: #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
            transform: translateX(5px);
        }
        
        .skill-name {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .skill-name span:first-child {
            color: #00ffff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .skill-name span:last-child {
            color: #ff00ff;
            font-weight: bold;
        }
        
        .skill-bar {
            height: 20px;
            background: rgba(10, 10, 15, 0.8);
            border: 1px solid #00ffff;
            box-shadow: inset 0 0 10px rgba(0, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .skill-progress {
            height: 100%;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            position: relative;
            transition: width 1s ease;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }
        
        .skill-progress::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shine 2s infinite;
        }
        
        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-cyber fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">CYBER</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" 
                    data-bs-target="#cyberNav" aria-controls="cyberNav" 
                    aria-expanded="false" aria-label="切换导航菜单">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="cyberNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">关于我</a>

                    <li class="nav-item">

            </div>
            
            <!-- 后端开发 -->
            <div class="skill-category">
                <h3 class="category-title">后端开发</h3>
                <div class="skills-grid">
                    <div class="skill-item">
                        <div class="skill-name">

                    <div class="skill-item">

                    <div class="skill-item">
                        <div class="skill-name">

                        </div>
                        <div class="skill-bar">

                    </div>
                </div>
            </div>
            
            <!-- 其他技能 -->
            <div class="skill-category">
                <h3 class="category-title">其他技能</h3>
                <div class="skills-grid">
                    <div class="skill-item">
                        <div class="skill-name">
                            <span>Git</span>

                        </div>
                        <div class="skill-bar">
                            <div class="skill-progress" style="width: 88%"></div>

                    <div class="skill-item">

                            <div class="skill-progress" style="width: 80%"></div>

                </div>
            </div>
        </div>
    </section>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 自动高亮当前页面
        document.addEventListener('DOMContentLoaded', function() {
            const currentPage = window.location.pathname.split('/').pop() || 'index.html';
            const navLinks = document.querySelectorAll('.nav-link');
            navLinks.forEach(link => link.classList.remove('active'));
            navLinks.forEach(link => {
                if (link.getAttribute('href') === currentPage) {
                    link.classList.add('active');
                }
            });
            
            // 技能条动画
            const skillBars = document.querySelectorAll('.skill-progress');
            skillBars.forEach(bar => {
                const width = bar.style.width;
                bar.style.width = '0';
                setTimeout(() => {
                    bar.style.width = width;
                }, 300);
            });
        });
    </script>
</body>
</html>
