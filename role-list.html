<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 页面编码设置 -->
    <meta charset="UTF-8">
    <!-- 移动端适配设置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 页面标题 -->
    <title>角色图鉴 - 万灵抽卡</title>
    <!-- 引入Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* ==================== 全局样式 ==================== */
        /* 重置默认样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* 页面主体样式 */
        body {
            background: #0a0a0a;
            min-height: 100vh;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow-x: hidden;
            color: #e0e0e0;
        }
        
        /* ==================== 动态背景纹理 ==================== */
        .bg-texture {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        /* 流动纹理 */
        .bg-texture::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(212, 175, 55, 0.08) 0%, transparent 40%),
                radial-gradient(ellipse at 80% 80%, rgba(199, 0, 57, 0.06) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 50%, rgba(138, 43, 226, 0.05) 0%, transparent 50%);
            animation: bgFlow 20s infinite ease-in-out;
        }
        
        @keyframes bgFlow {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-3%, -3%) rotate(2deg); }
        }
        
        /* 符文叠加 */
        .bg-texture::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 80px,
                    rgba(212, 175, 55, 0.02) 80px,
                    rgba(212, 175, 55, 0.02) 81px
                );
            animation: runeRotate 90s infinite linear;
        }
        
        @keyframes runeRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* ==================== 导航栏样式 ==================== */
        .navbar-cg {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #D4AF37;
            box-shadow: 0 4px 30px rgba(212, 175, 55, 0.3);
            padding: 15px 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }
        
        /* 网站标题 */
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #D4AF37, #C70039, #8A2BE2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        /* 导航按钮 */
        .nav-btn {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(10, 10, 10, 0.3));
            border: 1px solid #D4AF37;
            color: #D4AF37;
            padding: 10px 25px;
            margin-left: 10px;
            border-radius: 5px;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .nav-btn:hover {
            background: linear-gradient(135deg, #D4AF37, #C70039);
            color: #fff;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
            transform: translateY(-2px);
        }
        
        .navbar-toggler {
            border: 2px solid #D4AF37;
        }
        
        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='%23D4AF37' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }
        
        /* ==================== 主容器 ==================== */
        .main-container {
            padding-top: 100px;
            padding-bottom: 50px;
            min-height: 100vh;
        }
        
        /* 页面标题 */
        .page-title {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #D4AF37, #F9D71C);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
            letter-spacing: 5px;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
        }
        
        /* 页面副标题 */
        .page-subtitle {
            text-align: center;
            color: #808080;
            font-size: 1rem;
            margin-bottom: 50px;
            letter-spacing: 2px;
        }
        
        /* ==================== 角色卡片区 ==================== */
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 0 20px;
        }
        
        /* 角色卡片基础样式 */
        .role-card {
            background: rgba(20, 20, 20, 0.9);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            transition: all 0.4s ease;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }
        
        /* 角色卡片悬停 */
        .role-card:hover {
            transform: translateY(-10px);
        }
        
        /* ===== 神系卡片 ===== */
        .card-god {
            border: 2px solid #F9D71C;
            box-shadow: 0 0 30px rgba(249, 215, 28, 0.3);
        }
        
        .card-god:hover {
            box-shadow: 0 0 50px rgba(249, 215, 28, 0.6);
        }
        
        .card-god .card-header {
            background: linear-gradient(135deg, rgba(249, 215, 28, 0.2), rgba(0, 168, 232, 0.1));
        }
        
        .card-god .role-name {
            color: #F9D71C;
        }
        
        .card-god .role-type {
            background: linear-gradient(135deg, #F9D71C, #00A8E8);
            color: #000;
        }
        
        /* ===== 皇系卡片 ===== */
        .card-emperor {
            border: 2px solid #C70039;
            box-shadow: 0 0 30px rgba(199, 0, 57, 0.3);
        }
        
        .card-emperor:hover {
            box-shadow: 0 0 50px rgba(199, 0, 57, 0.6);
        }
        
        .card-emperor .card-header {
            background: linear-gradient(135deg, rgba(199, 0, 57, 0.2), rgba(144, 144, 144, 0.1));
        }
        
        .card-emperor .role-name {
            color: #C70039;
        }
        
        .card-emperor .role-type {
            background: linear-gradient(135deg, #C70039, #909090);
            color: #fff;
        }
        
        /* ===== 妖系卡片 ===== */
        .card-demon {
            border: 2px solid #00C896;
            box-shadow: 0 0 30px rgba(0, 200, 150, 0.3);
        }
        
        .card-demon:hover {
            box-shadow: 0 0 50px rgba(0, 200, 150, 0.6);
        }
        
        .card-demon .card-header {
            background: linear-gradient(135deg, rgba(0, 200, 150, 0.2), rgba(10, 10, 10, 0.3));
        }
        
        .card-demon .role-name {
            color: #00C896;
        }
        
        .card-demon .role-type {
            background: linear-gradient(135deg, #00C896, #00A080);
            color: #000;
        }
        
        /* ===== 魔系卡片 ===== */
        .card-devil {
            border: 2px solid #8A2BE2;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.3);
        }
        
        .card-devil:hover {
            box-shadow: 0 0 50px rgba(138, 43, 226, 0.6);
        }
        
        .card-devil .card-header {
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.2), rgba(139, 0, 0, 0.1));
        }
        
        .card-devil .role-name {
            color: #8A2BE2;
        }
        
        .card-devil .role-type {
            background: linear-gradient(135deg, #8A2BE2, #8B0000);
            color: #fff;
        }
        
        /* ==================== 卡片内部样式 ==================== */
        /* 卡片头部 */
        .card-header {
            padding: 30px 20px;
            text-align: center;
            position: relative;
        }
        
        /* 角色图片 */
        .role-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid;
            margin-bottom: 15px;
        }
        
        .card-god .role-image { border-color: #F9D71C; }
        .card-emperor .role-image { border-color: #C70039; }
        .card-demon .role-image { border-color: #00C896; }
        .card-devil .role-image { border-color: #8A2BE2; }
        
        /* 角色名称 */
        .role-name {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }
        
        /* 角色类型标签 */
        .role-type {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 2px;
        }
        
        /* 卡片内容 */
        .card-content {
            padding: 20px;
            background: rgba(15, 15, 15, 0.8);
        }
        
        /* 数据项 */
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.9rem;
        }
        
        .stat-row:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            color: #808080;
        }
        
        .stat-value {
            font-weight: bold;
        }
        
        /* ==================== 解锁状态 ==================== */
        /* 已解锁 */
        .unlocked .lock-overlay {
            display: none;
        }
        
        /* 未解锁 */
        .locked {
            opacity: 0.6;
            filter: grayscale(50%);
        }
        
        .locked .lock-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        
        .lock-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        
        .lock-text {
            color: #808080;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }
        
        /* ==================== 响应式适配 ==================== */
        @media (max-width: 768px) {
            .main-container {
                padding-top: 80px;
            }
            
            .page-title {
                font-size: 2rem;
            }
            
            .cards-container {
                gap: 20px;
            }
            
            .nav-btn {
                padding: 8px 15px;
                font-size: 0.85rem;
                margin: 5px;
            }
        }
    </style>
</head>
<body>
    <!-- ==================== 动态背景纹理 ==================== -->
    <div class="bg-texture"></div>
    
    <!-- ==================== 导航栏 ==================== -->
    <nav class="navbar navbar-expand-lg navbar-cg">
        <div class="container">
            <!-- 网站标题 -->
            <a class="navbar-brand" href="index.html">万灵抽卡</a>
            
            <!-- 移动端折叠按钮 -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" 
                    data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <!-- 导航菜单 -->
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <div class="d-flex">
                    <!-- 角色图鉴按钮 -->
                    <a href="role-list.html" class="nav-btn">角色图鉴</a>
                    <!-- 返回抽卡按钮 -->
                    <a href="index.html" class="nav-btn">返回抽卡</a>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- ==================== 主容器 ==================== -->
    <div class="container main-container">
        <!-- 页面标题 -->
        <h1 class="page-title">角色图鉴</h1>
        <p class="page-subtitle">神魔皇妖 · 四大阵营</p>
        
        <!-- 角色卡片区 -->
        <div class="cards-container" id="cardsContainer">
            <!-- 角色1：神·杨争 -->
            <a href="role1.html" class="role-card card-god" data-role="god">
                <div class="card-header">
                    <img src="https://via.placeholder.com/120/F9D71C/000?text=神" 
                         alt="神·杨争" class="role-image">

                    <span class="role-type">神系 · 神圣</span>
                </div>
                <div class="card-content">
                    <div class="stat-row">
                        <span class="stat-label">阵营</span>

            </a>
            
            <!-- 角色2：皇·郑涵文 -->
            <a href="role2.html" class="role-card card-emperor" data-role="emperor">
                <div class="card-header">
                    <img src="https://via.placeholder.com/120/C70039/fff?text=皇" 
                         alt="皇·郑涵文" class="role-image">
                    <h2 class="role-name">皇·郑涵文</h2>
                    <span class="role-type">皇系 · 威严</span>
                </div>
                <div class="card-content">
                    <div class="stat-row">
                        <span class="stat-label">阵营</span>
                        <span class="stat-value" style="color: #C70039;">皇室</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">稀有度</span>
                        <span class="stat-value" style="color: #FFD700;">传奇级</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">战力</span>
                        <span class="stat-value" style="color: #C70039;">98,888</span>
                    </div>
                </div>
                <div class="lock-overlay">
                    <div class="lock-icon">🔒</div>
                    <div class="lock-text">未解锁</div>
                </div>
            </a>
            
            <!-- 角色3：妖·田航 -->
            <a href="role3.html" class="role-card card-demon" data-role="demon">
                <div class="card-header">
                    <img src="https://via.placeholder.com/120/00C896/000?text=妖" 
                         alt="妖·田航" class="role-image">
                    <h2 class="role-name">妖·田航</h2>
                    <span class="role-type">妖系 · 灵动</span>
                </div>
                <div class="card-content">
                    <div class="stat-row">
                        <span class="stat-label">阵营</span>

            <!-- 角色4：魔·张轲智 -->
            <a href="role4.html" class="role-card card-devil" data-role="devil">

                         alt="魔·张轲智" class="role-image">

                <div class="card-content">

                        <span class="stat-label">阵营</span>
                        <span class="stat-value" style="color: #8A2BE2;">魔界</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">稀有度</span>
                        <span class="stat-value" style="color: #FF4500;">神话级</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">战力</span>
                        <span class="stat-value" style="color: #8A2BE2;">100,000</span>
                    </div>

                <div class="lock-overlay">
                    <div class="lock-icon">🔒</div>
                    <div class="lock-text">未解锁</div>

            </a>
        </div>
    </div>
    
    <!-- ==================== 引入Bootstrap 5 JS ==================== -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- ==================== 解锁状态检测脚本 ==================== -->
    <script>
        // 页面加载时检查解锁状态
        document.addEventListener('DOMContentLoaded', function() {
            // 从localStorage获取已解锁角色
            const unlockedRoles = JSON.parse(localStorage.getItem('unlockedRoles') || '[]');
            
            // 角色映射
            const roleMap = {
                'god': '神·杨争',
                'emperor': '皇·郑涵文',
                'demon': '妖·田航',
                'devil': '魔·张轲智'
            };
            
            // 遍历所有卡片
            const cards = document.querySelectorAll('.role-card');
            cards.forEach(card => {
                const roleKey = card.getAttribute('data-role');
                const roleName = roleMap[roleKey];
                
                // 检查是否已解锁
                if (unlockedRoles.includes(roleName)) {
                    // 已解锁：移除locked类，添加unlocked类
                    card.classList.remove('locked');
                    card.classList.add('unlocked');
                } else {
                    // 未解锁：添加locked类
                    card.classList.add('locked');
                }
            });
        });
    </script>
</body>
