<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 页面编码设置 -->
    <meta charset="UTF-8">
    <!-- 移动端适配设置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 页面标题 -->
    <title>皇·郑涵文 - 威严皇权</title>
    <!-- 引入Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* ==================== 全局样式 ==================== */
        /* 重置默认样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* 页面主体样式 - 暗黑基底 */
        body {
            background: #0a0a0a; /* 深空黑背景 */
            min-height: 100vh;
            font-family: 'Microsoft YaHei', sans-serif;
            overflow-x: hidden;
            color: #e0e0e0;
        }
        
        /* ==================== 动态背景纹理 ==================== */
        /* 背景容器 */
        .bg-texture {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        /* 流动祥云纹理 */
        .bg-texture::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(199, 0, 57, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(144, 144, 144, 0.06) 0%, transparent 50%);
            animation: cloudFlow 20s infinite ease-in-out;
        }
        
        /* 祥云流动动画 */
        @keyframes cloudFlow {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-5%, -5%) rotate(3deg); }
        }
        
        /* 符文纹理叠加 */
        .bg-texture::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(
                    45deg,
                    transparent,
                    transparent 50px,
                    rgba(199, 0, 57, 0.02) 50px,
                    rgba(199, 0, 57, 0.02) 51px
                );
            animation: runeRotate 60s infinite linear;
        }
        
        /* 符文旋转动画 */
        @keyframes runeRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* ==================== 导航栏样式 ==================== */
        /* 导航栏基础样式 */
        .navbar-cg {
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #C70039; /* 皇系红色边框 */
            box-shadow: 0 4px 30px rgba(199, 0, 57, 0.3);
            padding: 15px 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }
        
        /* 导航栏装饰符文 */
        .navbar-cg::before {
            content: '皇';
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5rem;
            color: #C70039;
            text-shadow: 0 0 10px rgba(199, 0, 57, 0.8);
            opacity: 0.5;
        }
        
        /* 网站标题样式 */
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #C70039, #909090);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(199, 0, 57, 0.5);
        }
        
        /* 导航按钮样式 */
        .nav-btn {
            background: linear-gradient(135deg, rgba(199, 0, 57, 0.2), rgba(144, 144, 144, 0.1));
            border: 1px solid #C70039;
            color: #C70039;
            padding: 10px 25px;
            margin-left: 10px;
            border-radius: 5px;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        /* 导航按钮悬停效果 */
        .nav-btn:hover {
            background: linear-gradient(135deg, #C70039, #909090);
            color: #fff;
            box-shadow: 0 0 20px rgba(199, 0, 57, 0.6);
            transform: translateY(-2px);
        }
        
        /* 移动端折叠按钮 */
        .navbar-toggler {
            border: 2px solid #C70039;
        }
        
        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='%23C70039' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }
        
        /* ==================== 角色展示区域 ==================== */
        /* 主容器样式 */
        .role-container {
            padding-top: 100px;
            min-height: 100vh;
        }
        
        /* 角色展示卡片 */
        .role-card {
            background: rgba(20, 20, 20, 0.9);
            border: 2px solid #C70039;
            border-radius: 20px;
            box-shadow: 
                0 0 30px rgba(199, 0, 57, 0.3),
                inset 0 0 30px rgba(199, 0, 57, 0.1);
            overflow: hidden;
            position: relative;
        }
        
        /* 角色卡片装饰 */
        .role-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(45deg, transparent 48%, rgba(199, 0, 57, 0.1) 50%, transparent 52%),
                linear-gradient(-45deg, transparent 48%, rgba(144, 144, 144, 0.1) 50%, transparent 52%);
            background-size: 20px 20px;
            pointer-events: none;
        }
        
        /* ==================== 左侧立绘区域 ==================== */
        /* 立绘容器 */
        .character-portrait {
            position: relative;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 500px;
            background: linear-gradient(180deg, rgba(199, 0, 57, 0.1), transparent);
        }
        
        /* 立绘图片容器 */
        .portrait-frame {
            width: 100%;
            max-width: 350px;
            height: 400px;
            border: 3px solid #C70039;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            box-shadow: 
                0 0 30px rgba(199, 0, 57, 0.5),
                inset 0 0 20px rgba(144, 144, 144, 0.2);
        }
        
        /* 立绘图片 */
        .portrait-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* 立绘框架装饰 - 顶部皇冠剪影 */
        .portrait-frame::before {
            content: '♔';
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 60px;
            color: #C70039;
            text-shadow: 0 0 20px rgba(199, 0, 57, 0.8);
            z-index: 10;
        }
        
        /* 立绘底部装饰 */
        .portrait-frame::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to top, rgba(199, 0, 57, 0.3), transparent);
            pointer-events: none;
        }
        
        /* 角色名称 */
        .role-title {
            font-size: 3rem;
            font-weight: 900;
            margin-top: 30px;
            background: linear-gradient(135deg, #C70039, #909090);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(199, 0, 57, 0.5);
            letter-spacing: 5px;
        }
        
        /* 角色前缀标签 */
        .role-prefix {
            display: inline-block;
            background: linear-gradient(135deg, #C70039, #8B0000);
            color: #fff;
            padding: 5px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-top: 10px;
            letter-spacing: 3px;
            box-shadow: 0 0 15px rgba(199, 0, 57, 0.5);
        }
        
        /* ==================== 右侧信息面板 ==================== */
        /* 信息面板容器 */
        .info-panel {
            padding: 40px;
            background: rgba(15, 15, 15, 0.8);
        }
        
        /* 面板标题 */
        .panel-title {
            font-size: 1.5rem;
            font-weight: 900;
            color: #C70039;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(199, 0, 57, 0.3);
            letter-spacing: 3px;
        }
        
        /* ==================== 游戏数据面板 ==================== */
        /* 数据项容器 */
        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(199, 0, 57, 0.2);
            transition: all 0.3s ease;
        }
        
        /* 数据项悬停效果 */
        .stat-item:hover {
            background: rgba(199, 0, 57, 0.1);
            padding-left: 10px;
        }
        
        /* 数据标签 */
        .stat-label {
            color: #909090;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        /* 数据值 */
        .stat-value {
            color: #C70039;
            font-weight: 900;
            font-size: 1.1rem;
        }
        
        /* 稀有度标签 */
        .rarity-tag {
            background: linear-gradient(135deg, #C70039, #FFD700);
            color: #fff;
            padding: 3px 12px;
            border-radius: 5px;
            font-size: 0.85rem;
            animation: rarityGlow 2s infinite;
        }
        
        /* 稀有度发光动画 */
        @keyframes rarityGlow {
            0%, 100% { box-shadow: 0 0 10px rgba(199, 0, 57, 0.5); }
            50% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.8); }
        }
        
        /* ==================== 技能区域 ==================== */
        /* 技能容器 */
        .skill-section {
            margin-top: 30px;
        }
        
        /* 技能卡片 */
        .skill-card {
            background: rgba(199, 0, 57, 0.1);
            border: 1px solid rgba(199, 0, 57, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }
        
        /* 技能卡片悬停 */
        .skill-card:hover {
            background: rgba(199, 0, 57, 0.2);
            box-shadow: 0 0 20px rgba(199, 0, 57, 0.3);
            transform: translateX(5px);
        }
        
        /* 技能名称 */
        .skill-name {
            font-size: 1.1rem;
            font-weight: 900;
            color: #C70039;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        
        /* 技能类型标签 */
        .skill-type {
            font-size: 0.7rem;
            background: rgba(144, 144, 144, 0.3);
            color: #909090;
            padding: 2px 8px;
            border-radius: 3px;
            margin-left: 10px;
        }
        
        /* 技能描述 */
        .skill-desc {
            color: #b0b0b0;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        
        /* ==================== 背景故事区域 ==================== */
        /* 故事容器 */
        .story-section {
            margin-top: 30px;
        }
        
        /* 故事内容 */
        .story-content {
            color: #c0c0c0;
            line-height: 1.8;
            font-size: 0.95rem;
            padding: 20px;
            background: rgba(199, 0, 57, 0.05);
            border-left: 3px solid #C70039;
            border-radius: 0 10px 10px 0;
        }
        
        /* ==================== 底部按钮 ==================== */
        /* 返回按钮容器 */
        .action-buttons {
            margin-top: 30px;
            text-align: center;
        }
        
        /* 返回按钮样式 */
        .btn-return {
            background: linear-gradient(135deg, #C70039, #909090);
            border: none;
            color: #fff;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: 3px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(199, 0, 57, 0.4);
            text-decoration: none;
            display: inline-block;
        }
        
        /* 返回按钮悬停 */
        .btn-return:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(199, 0, 57, 0.6);
            color: #fff;
        }
        
        /* ==================== 特效装饰 ==================== */
        /* 粒子容器 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        /* 单个粒子 */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #C70039;
            border-radius: 50%;
            animation: particleFloat 8s infinite ease-in-out;
            opacity: 0.6;
        }
        
        /* 粒子浮动动画 */
        @keyframes particleFloat {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0.6;
            }
            50% {
                transform: translateY(-100px) translateX(50px);
                opacity: 0.2;
            }
        }
        
        /* ==================== 响应式适配 ==================== */
        /* 平板设备 */
        @media (max-width: 992px) {
            .role-title {
                font-size: 2.5rem;
            }
            
            .info-panel {
                padding: 30px;
            }
        }
        
        /* 手机设备 */
        @media (max-width: 768px) {
            .role-container {
                padding-top: 80px;
            }
            
            .character-portrait {
                min-height: 400px;
                padding: 20px;
            }
            
            .portrait-frame {
                height: 300px;
            }
            
            .role-title {
                font-size: 2rem;
            }
            
            .info-panel {
                padding: 20px;
            }
            
            .panel-title {
                font-size: 1.2rem;
            }
            
            .nav-btn {
                padding: 8px 15px;
                font-size: 0.85rem;
                margin: 5px;
            }
        }
    </style>
</head>
<body>
    <!-- ==================== 动态背景纹理 ==================== -->
    <div class="bg-texture"></div>
    
    <!-- ==================== 粒子特效 ==================== -->
    <div class="particles" id="particles"></div>
    
    <!-- ==================== 导航栏 ==================== -->
    <nav class="navbar navbar-expand-lg navbar-cg">
        <div class="container">
            <!-- 网站标题 -->
            <a class="navbar-brand" href="index.html">万灵抽卡</a>
            
            <!-- 移动端折叠按钮 -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" 
                    data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <!-- 导航菜单 -->
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <div class="d-flex">
                    <!-- 角色图鉴按钮 -->
                    <a href="role-list.html" class="nav-btn">角色图鉴</a>
                    <!-- 返回抽卡按钮 -->
                    <a href="index.html" class="nav-btn">返回抽卡</a>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- ==================== 角色展示主容器 ==================== -->
    <div class="container role-container">
        <div class="role-card">
            <div class="row g-0">
                <!-- ==================== 左侧：角色立绘 ==================== -->
                <div class="col-lg-5">
                    <div class="character-portrait">
                        <!-- 立绘图片容器 -->
                        <div class="portrait-frame">
                            <!-- 占位图片，可替换为角色立绘 -->
                            <img src="https://via.placeholder.com/350x400/1a1a1a/C70039?text=皇·郑涵文" 
                                 alt="皇·郑涵文立绘">
                        </div>
                        
                        <!-- 角色名称 -->
                        <h1 class="role-title">皇·郑涵文</h1>
                        
                        <!-- 角色前缀 -->
                        <span class="role-prefix">威严正统 · 皇系</span>
                    </div>
                </div>
                
                <!-- ==================== 右侧：角色信息面板 ==================== -->
                <div class="col-lg-7">
                    <div class="info-panel">
                        <!-- 面板标题 -->
                        <h2 class="panel-title">⚔ 角色数据面板</h2>
                        
                        <!-- ===== 游戏数据面板 ===== -->
                        <div class="stat-item">
                            <span class="stat-label">等级</span>
                            <span class="stat-value">SSR · 98级</span>
                        </div>
                        
                        <div class="stat-item">
                            <span class="stat-label">阵营</span>
                            <span class="stat-value">皇室</span>
                        </div>
                        
                        <div class="stat-item">
                            <span class="stat-label">稀有度</span>
                            <span class="rarity-tag">传奇级</span>
                        </div>
                        
                        <div class="stat-item">
                            <span class="stat-label">战力</span>
                            <span class="stat-value" style="color: #FFD700;">98,888</span>
                        </div>
                        
                        <div class="stat-item">
                            <span class="stat-label">核心天赋</span>
                            <span class="stat-value">技术钻研，统筹布局，热心公益</span>
                        </div>
                        
                        <p style="color: #909090; font-size: 0.85rem; margin-top: -10px;">
                            【热心公益】
                        </p>
                        
                        <!-- ===== 阵营倾向 ===== -->
                        <div class="stat-item">
                            <span class="stat-label">阵营倾向</span>
                            <span class="stat-value">偏热心</span>
                        </div>
                        
                        <!-- ===== 技能区域 ===== -->
                        <div class="skill-section">
                            <h3 class="panel-title">⚡ 角色技能</h3>
                            
                            <!-- 主动技能 -->
                            <div class="skill-card">
                                <div class="skill-name">
                                    
                                    <span class="skill-type">主动技能</span>
                                </div>
                                <p class="skill-desc">
                                    活动策划
                                </p>
                            </div>
                            
                            <!-- 被动技能 -->
                            <div class="skill-card">
                                <div class="skill-name">
                                   网页开发、办公应用
                                    <span class="skill-type">被动技能</span>
                                </div>
                                <p class="skill-desc">
                                    文案撰写、团队指挥
                                </p>
                            </div>
                        </div>
                        
                        <!-- ===== 角色背景故事 ===== -->
                        <div class="story-section">
                            <h3 class="panel-title">📜 角色背景</h3>
                            <div class="story-content">
                                来自渠县的在校大学生，身兼学生干部与返乡志愿者，青马学员，共青团员
                            </div>
                        </div>
                        
                        <!-- ===== 阵营使命 ===== -->
                        <div class="story-section">
                            <h3 class="panel-title">🎯 阵营使命</h3>
                            <div class="story-content">
                                以技术守一方安稳，以实干成就一番事业，成为能担重任的时代先锋
                            </div>
                        </div>
                        
                        <!-- ===== 返回按钮 ===== -->
                        <div class="action-buttons">
                            <a href="index.html" class="btn-return">↩ 返回抽卡</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- ==================== 引入Bootstrap 5 JS ==================== -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- ==================== 粒子特效生成脚本 ==================== -->
    <script>
        // 创建粒子特效
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 30; // 粒子数量，可修改
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // 随机位置
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                
                // 随机动画延迟
                particle.style.animationDelay = Math.random() * 8 + 's';
                
                // 随机大小
                const size = Math.random() * 4 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                
                // 随机颜色（皇系红/银灰）
                const colors = ['#C70039', '#909090', '#8B0000'];
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                container.appendChild(particle);
            }
        }
        
        // 页面加载时执行
        document.addEventListener('DOMContentLoaded', createParticles);
    </script>
</body>
</html>
