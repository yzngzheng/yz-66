<head>

    <title>神·杨争 - 神界守护者</title>
    <!-- 网站标题【固定，不可修改角色名称】 -->
    
    <!-- 引入Bootstrap5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* ========== 全局CSS变量配置 ========== */
        /* 神系配色方案【可修改颜色值】 */
        :root {
            /* 主色调 */
            --deep-black: #121212; /* 深空黑 - 主背景色 */
            --souls-gray: #2A2A2A; /* 魂系灰 - 次级背景 */
            --moon-silver: #C0C0C0; /* 月光银 - 文字色 */
            
            /* 神系专属配色 */
            --god-gold: #F9D71C; /* 神圣金 - 主强调色 */
            --god-blue: #00A8E8; /* 天空蓝 - 辅助色 */
            --god-light: #FFF8DC; /* 神圣光 - 高光色 */
            --god-glow: rgba(249, 215, 28, 0.6); /* 神圣辉光 */
        }
        
        /* ========== 全局基础重置 ========== */
        * {
            margin: 0; /* 清除外边距 */
            padding: 0; /* 清除内边距 */
            box-sizing: border-box; /* 盒模型统一 */
        }
        
        /* ========== 页面整体样式 ========== */
        body {
            background-color: var(--deep-black); /* 深黑背景 */
            color: var(--moon-silver); /* 银色文字 */
            font-family: 'Microsoft YaHei', '微软雅黑', sans-serif; /* 字体设置 */
            min-height: 100vh; /* 最小高度 */
            overflow-x: hidden; /* 禁止横向滚动 */
            position: relative; /* 相对定位 */
        }
        
        /* ========== 动态背景纹理 ========== */
        /* 创建神圣符文背景 */
        body::before {
            content: ''; /* 伪元素 */
            position: fixed; /* 固定定位 */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 神圣渐变 + 符文纹理 */
            background: 
                radial-gradient(ellipse at 30% 20%, rgba(249, 215, 28, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(0, 168, 232, 0.05) 0%, transparent 50%),
                linear-gradient(180deg, rgba(18, 18, 18, 0.95) 0%, rgba(42, 42, 42, 0.85) 100%);
            z-index: -1; /* 底层 */
            animation: godBgPulse 8s ease-in-out infinite; /* 脉冲动画 */
        }
        
        /* 神圣背景脉冲动画 */
        @keyframes godBgPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        
        /* ========== 神圣光柱特效 ========== */
        /* 神圣光柱 */
        .god-light-pillar {
            position: fixed; /* 固定定位 */
            top: 0; /* 顶部 */
            left: 50%; /* 水平居中 */
            transform: translateX(-50%); /* 居中 */
            width: 300px; /* 宽度 */
            height: 100%; /* 全高 */
            background: linear-gradient(180deg, 
                rgba(249, 215, 28, 0.15) 0%, 
                transparent 50%, 
                rgba(249, 215, 28, 0.1) 100%); /* 神圣渐变 */
            pointer-events: none; /* 不影响点击 */
            z-index: 0; /* 层级 */
            filter: blur(40px); /* 模糊 */
            animation: lightPillarFloat 6s ease-in-out infinite; /* 浮动动画 */
        }
        
        /* 光柱浮动动画 */
        @keyframes lightPillarFloat {
            0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.3; }
            50% { transform: translateX(-50%) translateY(-20px); opacity: 0.5; }
        }
        
        /* ========== 粒子特效层 ========== */
        .particles-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        
        /* 神圣粒子 */
        .particle-god {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--god-gold); /* 神圣金 */
            border-radius: 50%;
            box-shadow: 0 0 8px var(--god-gold), 0 0 15px var(--god-blue); /* 发光 */
            animation: particleFloatGod 12s infinite linear;
        }
        
        /* 神圣粒子浮动动画 */
        @keyframes particleFloatGod {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
        
        /* ========== 祥云装饰 ========== */
        .cloud-decoration {
            position: fixed;
            width: 200px;
            height: 60px;
            background: radial-gradient(ellipse at center, 
                rgba(249, 215, 28, 0.1) 0%, 
                transparent 70%);
            border-radius: 50%;
            filter: blur(20px);
            pointer-events: none;
            animation: cloudDrift 20s infinite linear;
        }
        
        /* 祥云飘动动画 */
        @keyframes cloudDrift {
            0% { transform: translateX(-100px); }
            100% { transform: translateX(calc(100vw + 100px)); }
        }
        
        /* ========== 顶部导航栏（CG风格） ========== */
        .navbar-cg {
            background: linear-gradient(180deg, 
                rgba(18, 18, 18, 0.98) 0%, 
                rgba(42, 42, 42, 0.95) 100%);
            border-bottom: 2px solid var(--god-gold); /* 神圣金边框 */
            box-shadow: 0 4px 30px rgba(249, 215, 28, 0.3);
            padding: 12px 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        
        /* 网站标题 */
        .site-title-cg {
            font-size: 1.6rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--god-gold) 0%, var(--god-blue) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-decoration: none;
        }
        
        /* 标题装饰符文 */
        .site-title-cg::before,
        .site-title-cg::after {
            content: '✦';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.6rem;
            color: var(--god-gold);
            text-shadow: 0 0 10px var(--god-gold);
            animation: runeBlink 2s infinite;
        }
        
        .site-title-cg::before { left: -25px; }
        .site-title-cg::after { right: -25px; }
        
        @keyframes runeBlink {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        /* 导航按钮 */
        .nav-btn-cg {
            color: var(--moon-silver) !important;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 10px 25px !important;
            background: transparent;
            border: 1px solid transparent;
            transition: all 0.4s ease;
            text-decoration: none;
        }
        
        /* 导航按钮悬停效果 */
        .nav-btn-cg:hover {
            color: var(--god-gold) !important;
            border: 1px solid var(--god-gold);
            text-shadow: 0 0 15px var(--god-gold);
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(249, 215, 28, 0.4);
        }
        
        /* 汉堡菜单 */
        .navbar-toggler {
            border: 2px solid var(--god-gold);
            border-radius: 8px;
        }
        
        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='%23F9D71C' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3E%3C/svg%3E");
        }
        
        .navbar-collapse {
            background: rgba(18, 18, 18, 0.98);
            border: 1px solid var(--god-gold);
            border-radius: 10px;
            margin-top: 15px;
            padding: 15px;
            box-shadow: 0 0 30px rgba(249, 215, 28, 0.3);
        }
        
        /* ========== 主内容区域 ========== */
        .main-container {
            padding-top: 100px;
            padding-bottom: 60px;
            min-height: 100vh;
            position: relative;
            z-index: 2;
        }
        
        /* ========== 角色展示容器 ========== */
        .role-container {
            display: flex;
            flex-wrap: wrap;
            gap: 50px;
            align-items: flex-start;
        }
        
        /* ========== 左侧角色立绘区域 ========== */
        .role-image-section {
            flex: 1;
            min-width: 320px;
        }
        
        /* 角色立绘卡片 */
        .role-image-card {
            background: linear-gradient(180deg, var(--souls-gray) 0%, var(--deep-black) 100%);
            border: 4px solid var(--god-gold); /* 神圣金边框 */
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 
                0 0 50px var(--god-glow), /* 外发光 */
                inset 0 0 50px rgba(249, 215, 28, 0.15); /* 内发光 */
            position: relative;
            animation: cardFloatGod 4s ease-in-out infinite; /* 浮动动画 */
        }
        
        /* 卡片浮动动画 */
        @keyframes cardFloatGod {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        /* 角色图片 */
        .role-image {
            width: 100%;
            height: auto;
            display: block;
            min-height: 550px;
            object-fit: cover;
        }
        
        /* 图片装饰边框 */
        .role-image-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 2px solid rgba(249, 215, 28, 0.3);
            border-radius: 20px;
            pointer-events: none;
        }
        
        /* 角色稀有度标识 */
        .rarity-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--god-gold), var(--god-blue));
            color: var(--deep-black);
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85rem;
            letter-spacing: 2px;
            box-shadow: 0 0 20px var(--god-glow);
        }
        
        /* ========== 右侧角色信息区域 ========== */
        .role-info-section {
            flex: 1;
            min-width: 320px;
        }
        
        /* 角色信息卡片 */
        .role-info-card {
            background: linear-gradient(180deg, 
                rgba(42, 42, 42, 0.9) 0%, 
                rgba(18, 18, 18, 0.95) 100%);
            border: 3px solid var(--god-gold);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 
                0 0 40px var(--god-glow),
                inset 0 0 30px rgba(249, 215, 28, 0.1);
        }
        
        /* 角色名称 */
        .role-name {
            font-size: 3.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--god-gold) 0%, var(--god-blue) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            letter-spacing: 8px;
            text-shadow: 0 0 40px var(--god-glow);
        }
        
        /* 角色前缀标签 */
        .role-title {
            display: inline-block;
            background: linear-gradient(90deg, var(--god-gold), var(--god-blue));
            color: var(--deep-black);
            padding: 10px 30px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1rem;
            letter-spacing: 3px;
            margin-bottom: 30px;
            box-shadow: 0 0 25px var(--god-glow);
        }
        
        /* ========== 角色面板区域 ========== */
        /* 面板容器 */
        .panel-section {
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(249, 215, 28, 0.2);
        }
        
        /* 面板标题 */
        .panel-title {
            color: var(--god-gold);
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 12px;
            text-shadow: 0 0 10px var(--god-glow);
        }
        
        /* 面板内容 */
        .panel-content {
            color: var(--moon-silver);
            font-size: 1.05rem;
            line-height: 1.8;
            text-shadow: 0 0 5px rgba(192, 192, 192, 0.3);
        }
        
        /* 角色面板数据网格 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        /* 单个数据项 */
        .stat-item {
            background: rgba(249, 215, 28, 0.08);
            border-left: 3px solid var(--god-gold);
            padding: 12px 15px;
            border-radius: 0 10px 10px 0;
            transition: all 0.3s ease;
        }
        
        .stat-item:hover {
            background: rgba(249, 215, 28, 0.15);
            transform: translateX(5px);
            box-shadow: 0 0 15px var(--god-glow);
        }
        
        /* 数据标签 */
        .stat-label {
            color: var(--god-blue);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        
        /* 数据值 */
        .stat-value {
            color: var(--god-gold);
            font-size: 1.1rem;
            font-weight: bold;
            text-shadow: 0 0 10px var(--god-glow);
        }
        
        /* ========== 技能列表 ========== */
        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        /* 技能标签 */
        .skill-tag {
            background: rgba(0, 168, 232, 0.2);
            border: 1px solid var(--god-blue);
            color: var(--god-blue);
            padding: 10px 22px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: bold;
            transition: all 0.3s ease;
            cursor: default;
        }
        
        /* 技能标签悬停 */
        .skill-tag:hover {
            background: var(--god-blue);
            color: var(--deep-black);
            box-shadow: 0 0 25px rgba(0, 168, 232, 0.8);
            transform: scale(1.08);
        }
        
        /* ========== 角色背景描述 ========== */
        .role-description {
            color: var(--moon-silver);
            font-size: 1rem;
            line-height: 2;
            padding: 25px;
            background: rgba(42, 42, 42, 0.5);
            border-left: 4px solid var(--god-gold);
            border-radius: 0 15px 15px 0;
            margin-top: 10px;
        }
        
        /* ========== 返回按钮 ========== */
        .back-button {
            display: inline-block;
            margin-top: 35px;
            padding: 15px 45px;
            background: transparent;
            border: 3px solid var(--god-gold);
            color: var(--god-gold);
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-radius: 12px;
            transition: all 0.4s ease;
            box-shadow: 0 0 20px var(--god-glow);
        }
        
        .back-button:hover {
            background: var(--god-gold);
            color: var(--deep-black);
            box-shadow: 0 0 40px var(--god-glow);
            transform: translateY(-4px);
        }
        
        /* ========== 响应式适配 ========== */
        @media (max-width: 992px) {
            .role-name { font-size: 2.5rem; }
            .role-image { min-height: 450px; }
            .stats-grid { grid-template-columns: 1fr; }
        }
        
        @media (max-width: 576px) {
            .role-name { font-size: 2rem; letter-spacing: 4px; }
            .role-image { min-height: 350px; }
            .role-info-card { padding: 25px; }
            .back-button { padding: 12px 35px; font-size: 0.9rem; }
        }
    </style>
</head>

    <!-- 引入Bootstrap5 JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- ========== JavaScript功能代码 ========== -->
    <script>
        // ========== 页面加载时执行 ==========
        document.addEventListener('DOMContentLoaded', function() {
            createParticles(); // 创建神圣粒子
        });
        
        // ========== 创建神圣粒子 ==========
        function createParticles() {
            const container = document.getElementById('particlesLayer');
            const particleCount = 25; // 粒子数量【可修改】
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle-god';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 12 + 's';
                particle.style.animationDuration = (Math.random() * 6 + 9) + 's';
                
                // 部分粒子使用蓝色
                if (Math.random() > 0.6) {
                    particle.style.background = '#00A8E8';
                    particle.style.boxShadow = '0 0 8px #00A8E8, 0 0 15px #F9D71C';
                }
                
                container.appendChild(particle);
            }
        }
    </script>
</body>
</html>
